<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statusin — Guest Status Link View</title>

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Statusin" />
  <meta property="og:title" content="{{journey.title}} — {{business.name}}" />
  <meta property="og:description" content="{{journey.current_label}} · Case #{{journey.case_number}} · {{journey.freshness_line}}" />
  <meta property="og:image" content="{{og_image_url}}" />
  <meta property="og:url" content="{{canonical_url}}" />
  <meta name="twitter:card" content="summary_large_image" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
      #lightbox-fly, .lightbox-card, #lightbox-track { transition: none !important; }
    }
  </style>

  <style>
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    #lightbox { -webkit-tap-highlight-color: transparent; overscroll-behavior: contain; touch-action: none; }
    #lightbox-stage { will-change: transform; }
    #lightbox-track { display: flex; width: 100%; height: 100%; transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1); will-change: transform; }
    #lightbox-track.no-anim { transition: none; }
    .lightbox-slide { width: 100%; min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 16px; }
    .lightbox-card { position: relative; width: min(86vw, 520px); aspect-ratio: 3 / 2; border-radius: 1rem; overflow: hidden; background: rgba(255,255,255,0.06); box-shadow: 0 30px 90px rgba(0,0,0,0.40); transform-origin: center center; transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1); will-change: transform; }
    .lightbox-card.no-anim { transition: none; }
    .lightbox-placeholder, .lightbox-full { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
    .lightbox-placeholder { filter: blur(18px); transform: scale(1.06); opacity: 0.58; }
    .lightbox-full { opacity: 0; transition: opacity 0.22s ease-out; }
    .lightbox-full.is-loaded { opacity: 1; }
    .lightbox-full.is-error { opacity: 1; object-fit: none; background: rgba(255,255,255,0.04); }
    .lightbox-shimmer { position: absolute; inset: 0; overflow: hidden; background: rgba(255,255,255,0.08); }
    .lightbox-shimmer::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); animation: shimmer 1.4s infinite; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent); }
    .lightbox-shimmer.is-hidden { display: none; }
    .lightbox-ui { transition: opacity 0.22s ease-out; }
    #lightbox-fly { position: fixed; z-index: 140; object-fit: cover; border-radius: 0.75rem; box-shadow: 0 30px 90px rgba(0,0,0,0.40); pointer-events: none; opacity: 0; transition: top 0.32s cubic-bezier(0.22,1,0.36,1), left 0.32s cubic-bezier(0.22,1,0.36,1), width 0.32s cubic-bezier(0.22,1,0.36,1), height 0.32s cubic-bezier(0.22,1,0.36,1), border-radius 0.32s cubic-bezier(0.22,1,0.36,1), opacity 0.20s ease-out; }
    @media (orientation: landscape) and (max-height: 500px) {
      .lightbox-card { width: min(60vw, 480px); aspect-ratio: 16 / 9; }
      #lightbox-caption { bottom: 6px; padding: 0 1rem; }
      #lightbox-caption #lightbox-caption-text { font-size: 10px; max-height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      #lightbox-caption #lightbox-helper-text { display: none; }
      #lightbox-dots { bottom: 68px; }
    }
    .avatar-fallback { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; border-radius: 9999px; background: #16465B; color: white; font-weight: 700; font-size: 1.125rem; text-transform: uppercase; }
  </style>
</head>

<body class="min-h-screen bg-white px-4 sm:px-6 pt-0 pb-4 overflow-x-hidden">

  <!-- Subtle ambient -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute -top-40 -left-32 w-[560px] h-[560px] rounded-full blur-[140px] bg-[#F6F1EA]/70"></div>
    <div class="absolute -bottom-44 -right-28 w-[620px] h-[620px] rounded-full blur-[150px] bg-[#FF5A5F]/7"></div>
    <div class="absolute top-[32%] left-[52%] -translate-x-1/2 w-[420px] h-[420px] rounded-full blur-[130px] bg-[#16465B]/4"></div>
  </div>

  <main class="relative z-10 w-full max-w-[560px] mx-auto">
    <div class="isolate flex flex-col w-full mx-auto relative bg-transparent text-slate-950">

      <!-- Sticky Header -->
      <div class="sticky top-0 z-50 -mx-4 sm:-mx-6 px-5 sm:px-6 py-4 flex items-center justify-between bg-white/78 backdrop-blur-2xl border-b border-slate-950/[0.04] shadow-[0_10px_34px_rgba(15,23,42,0.045)]">
        <button class="flex items-center gap-3 text-left group focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25 rounded-2xl transition-all" aria-label="Profil bisnis">
          <div id="avatar-wrapper" class="w-11 h-11 rounded-full bg-white p-[2px] group-active:scale-95 transition-transform duration-200 shadow-[0_8px_20px_rgba(15,23,42,0.10)] ring-1 ring-slate-950/[0.06]"></div>
          <div>
            <h2 id="business-name" class="text-[15px] font-bold tracking-tight text-slate-950"></h2>
            <p id="case-number" class="text-[11px] font-medium mt-0.5 text-slate-400"></p>
          </div>
        </button>
        <button id="btn-share" class="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-all focus:outline-none focus-visible:ring-2 bg-white/86 hover:bg-white active:bg-slate-100 focus-visible:ring-[#16465B]/20 border border-white shadow-[0_8px_20px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.04]" aria-label="Bagikan link status">
          <iconify-icon icon="solar:share-linear" class="text-lg text-[#16465B]"></iconify-icon>
        </button>
      </div>

      <!-- Main Content -->
      <div class="relative z-20 px-1 sm:px-0 pt-7 pb-10">

        <!-- ═══ HERO ═══ Flat, no container -->
        <section class="mb-7" aria-labelledby="hero-status-title">
          <p id="journey-complaint" class="text-[13px] text-slate-400 font-medium mb-2"></p>
          <h1 id="hero-status-title" class="text-[27px] font-extrabold text-slate-950 tracking-tight leading-[1.15] mb-4"></h1>
          <div class="flex items-center gap-2.5 flex-wrap">
            <span id="hero-badge" class="inline-flex items-center gap-1.5 text-[12px] font-bold text-[#16465B] bg-[#16465B]/[0.07] px-3 py-1.5 rounded-full">
              <iconify-icon icon="solar:user-circle-bold" class="text-[14px]"></iconify-icon>
              <span id="hero-badge-text"></span>
            </span>
            <span id="hero-freshness" class="text-[12px] font-medium text-slate-400"></span>
          </div>
        </section>

        <!-- ═══ CERTAINTY SUMMARY ═══ v38-style panel with proper depth -->
        <section class="mb-7 bg-white/86 backdrop-blur-2xl border border-white rounded-[1.75rem] p-5 shadow-[0_18px_54px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.045]" aria-label="Ringkasan status">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 ring-1 ring-blue-100 shrink-0" aria-hidden="true">
              <iconify-icon icon="solar:shield-check-bold-duotone" class="text-xl"></iconify-icon>
            </div>
            <div>
              <p class="text-[10px] text-[#16465B] font-extrabold uppercase tracking-wider mb-0.5">Status Saat Ini</p>
              <p id="status-headline" class="text-slate-950 font-bold text-base leading-tight"></p>
              <p id="status-description" class="text-[13px] text-slate-500 leading-[19px] mt-1"></p>
            </div>
          </div>

          <div class="bg-[#F8FAFC]/82 backdrop-blur-xl rounded-2xl p-4 border border-slate-950/[0.04] space-y-3 shadow-inner">
            <div class="flex justify-between items-center">
              <span id="responsibility-label" class="text-slate-500 text-xs font-semibold"></span>
              <span id="responsibility-badge" class="text-xs font-bold px-2.5 py-1 bg-[#16465B]/8 text-[#16465B] rounded-lg"></span>
            </div>

            <div class="flex justify-between items-center">
              <span class="text-slate-500 text-xs font-semibold">Update Terakhir</span>
              <span id="freshness-line" class="text-slate-950 text-xs font-bold"></span>
            </div>

            <div class="h-px bg-slate-200/80 w-full my-2"></div>

            <div id="next-update-row" class="flex gap-3 items-start">
              <div class="mt-0.5 w-6 h-6 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0" aria-hidden="true">
                <iconify-icon icon="solar:clock-circle-bold" class="text-sm"></iconify-icon>
              </div>
              <div>
                <p id="next-update-label" class="text-[14px] font-bold text-slate-900 leading-[20px]"></p>
                <p id="next-expectation-note" class="text-[13px] text-slate-500 leading-[19px] mt-1"></p>
              </div>
            </div>
          </div>
        </section>

        <!-- ═══ STATUS RAIL ═══ -->
        <section aria-label="Progress Layanan" class="mb-2">
          <h3 class="text-[13px] font-semibold text-[#16465B] mb-5">Progress Layanan</h3>
          <ol id="status-rail" class="relative list-none p-0 m-0" role="list"></ol>
        </section>

        <!-- ═══ CTA ═══ -->
        <section class="pt-3">
          <a id="cta-whatsapp" href="#" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2.5 w-full px-5 py-3 rounded-2xl bg-[#16465B]/[0.07] hover:bg-[#16465B]/[0.11] active:scale-[0.98] transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25">
            <iconify-icon icon="mdi:whatsapp" class="text-lg text-[#16465B]"></iconify-icon>
            <span id="cta-whatsapp-text" class="text-[14px] font-semibold text-[#16465B]"></span>
          </a>
        </section>

        <!-- ═══ FOOTER ═══ -->
        <footer class="pt-16 pb-4 text-center">
          <p class="text-xs font-semibold text-slate-400 mb-0.5 tracking-wide">Statusin</p>
          <p class="text-xs text-slate-400">Kepastian untuk setiap layanan</p>
        </footer>
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-[100] opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-950/60 backdrop-blur-xl overflow-hidden" role="dialog" aria-modal="true" aria-label="Galeri foto bukti">
    <div id="lightbox-handle" class="lightbox-ui absolute top-3 left-1/2 -translate-x-1/2 w-10 h-1 rounded-full bg-white/30 z-20" aria-hidden="true"></div>
    <button type="button" onclick="closeLightbox()" aria-label="Tutup galeri foto" id="lightbox-close" class="lightbox-ui absolute top-5 right-5 w-10 h-10 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 active:scale-90 transition-all text-white z-20"><iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon></button>
    <div id="lightbox-counter" class="lightbox-ui absolute top-6 left-1/2 -translate-x-1/2 text-xs font-semibold text-white/80 bg-white/10 rounded-full px-3 py-1 z-20" aria-live="polite" aria-atomic="true">1 / 2</div>
    <div id="lightbox-stage" class="absolute inset-0 flex items-center justify-center overflow-hidden"><div id="lightbox-track"></div></div>
    <img id="lightbox-fly" src="" alt="" draggable="false" aria-hidden="true">
    <div id="lightbox-dots" class="lightbox-ui absolute bottom-40 left-1/2 -translate-x-1/2 flex gap-1.5 z-20" aria-hidden="true"></div>
    <div id="lightbox-caption" class="lightbox-ui absolute bottom-14 left-1/2 -translate-x-1/2 text-center px-6 w-full max-w-[560px] z-20">
      <p class="text-[13px] font-semibold text-white">Catatan Teknisi</p>
      <p id="lightbox-caption-text" class="text-xs text-white/70 mt-1 leading-relaxed"></p>
      <p id="lightbox-helper-text" class="text-[11px] text-white/50 mt-2">Cubit untuk memperbesar &middot; Geser untuk melihat foto lain</p>
    </div>
  </div>

  <script>
    const PAGE_DATA = {
      business: { name: "iRepair Jakarta", avatar_url: "https://i.pravatar.cc/150?u=irepair-jakarta", whatsapp_number: "+6285143550781" },
      journey: { case_number: "SRV-681657", title: "Service iPhone 11", complaint: "Service iPhone 11 · Mati total, layar retak", status_headline: "Sedang diperiksa teknisi", status_description: "Teknisi sedang mengecek komponen utama perangkat Anda. Hasil pemeriksaan akan digunakan untuk menentukan langkah berikutnya.", responsibility_label: "Ditangani oleh", responsibility_badge: "Teknisi", freshness_line: "Baru saja", next_update_at: "2026-06-05T17:00:00+07:00", next_expectation_note: "Estimasi biaya akan muncul setelah pengecekan selesai.", guest_url: window.location.href },
      service: { id: "case-681657", title: "Service iPhone 11", currentStepIndex: 1, currentStepKey: "initial_check" },
      steps: [
        { key: "service_received", label: "Layanan Diterima", status: "done", completedAtLabel: "Hari ini, 09.12" },
        { key: "initial_check", label: "Pemeriksaan Awal", status: "current", startedAtLabel: "Dimulai hari ini, 10.45" },
        { key: "cost_approval", label: "Persetujuan Biaya", status: "next" },
        { key: "in_progress", label: "Sedang Diproses", status: "upcoming" },
        { key: "final_check", label: "Pemeriksaan Akhir", status: "upcoming" },
        { key: "ready_for_pickup", label: "Siap Diambil", status: "upcoming" },
        { key: "completed", label: "Layanan Selesai", status: "upcoming" },
      ],
      evidencePhotos: [{ id: "ev-001", stepKey: "initial_check", title: "Catatan Teknisi", description: "Foto kondisi perangkat setelah casing dibuka. Teknisi sedang mengecek jalur power dan konektor baterai.", capturedAtLabel: "12 mnt lalu", visibleToCustomer: true, photos: [{ src: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=1200", thumb: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=240", caption: "Foto kondisi perangkat setelah casing dibuka." }, { src: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=1200", thumb: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=240", caption: "Pemeriksaan komponen internal pada papan logic board." }] }],
    };

    // ─── UTILITIES ───────────────────────────────────────────────────────────
    function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatNextUpdate(iso) { if (!iso) return null; const d = new Date(iso); if (isNaN(d.getTime())) return null; const now = new Date(); const t = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta' }); return d.toDateString() === now.toDateString() ? `Update berikutnya diperkirakan hari ini pk ${t}` : `Update berikutnya: ${d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Asia/Jakarta' })} pk ${t}`; }

    // ─── AUTO-REFRESH (SILENT) ───────────────────────────────────────────────
    const REFRESH_INTERVAL_MS = 90000; let lastLoadedAt = new Date(); let refreshTimer = null;
    function performSilentRefresh() { lastLoadedAt = new Date(); }
    function startAutoRefresh() { stopAutoRefresh(); refreshTimer = setInterval(() => { if (!document.hidden) performSilentRefresh(); }, REFRESH_INTERVAL_MS); }
    function stopAutoRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }
    document.addEventListener('visibilitychange', () => { if (!document.hidden) { if (Date.now() - lastLoadedAt.getTime() > 60000) performSilentRefresh(); startAutoRefresh(); } else stopAutoRefresh(); });

    // ─── WINDOWED RAIL ───────────────────────────────────────────────────────
    function getVisibleSteps(steps, idx) { const last = steps.length - 1; return steps.slice(0, Math.min(Math.max(idx + 1, 2), last) + 1); }
    function getEvidenceForStep(key) { if (!PAGE_DATA.evidencePhotos?.length) return null; return PAGE_DATA.evidencePhotos.find(e => e.stepKey === key && e.visibleToCustomer) || null; }

    // ─── RENDER STATUS RAIL ──────────────────────────────────────────────────
    function renderStatusRail() {
      const { steps, service } = PAGE_DATA;
      if (!steps?.length) { const s = document.getElementById('status-rail')?.closest('section'); if (s) s.style.display = 'none'; return; }
      const visible = getVisibleSteps(steps, service.currentStepIndex);
      const rail = document.getElementById('status-rail'); rail.innerHTML = '';
      visible.forEach((step, i) => {
        const isLast = i === visible.length - 1; const ev = getEvidenceForStep(step.key);
        const li = document.createElement('li'); li.className = `relative flex gap-4 ${isLast ? '' : 'pb-7'}`;
        if (step.status === 'current') li.setAttribute('aria-current', 'step');
        const left = document.createElement('div'); left.className = 'relative w-6 shrink-0 flex justify-center'; left.setAttribute('aria-hidden', 'true');
        if (step.status === 'done') left.innerHTML = `<iconify-icon icon="solar:check-circle-bold" class="relative z-10 text-[21px] text-slate-300"></iconify-icon>${!isLast ? '<div class="absolute top-[21px] -bottom-7 w-px bg-slate-200"></div>' : ''}`;
        else if (step.status === 'current') left.innerHTML = `<div class="relative z-10 w-[20px] h-[20px] shrink-0 mt-0.5 rounded-full bg-blue-500 border-[3px] border-white shadow-[0_0_0_4px_rgba(59,130,246,0.12)]"></div>${!isLast ? '<div class="absolute top-[24px] -bottom-7 w-px bg-slate-200"></div>' : ''}`;
        else left.innerHTML = `<div class="relative z-10 w-[20px] h-[20px] shrink-0 mt-0.5 rounded-full border-2 border-slate-200 bg-white"></div>${!isLast ? '<div class="absolute top-[24px] -bottom-7 w-px bg-slate-200"></div>' : ''}`;
        li.appendChild(left);
        const right = document.createElement('div'); right.className = 'min-w-0 flex-1';
        if (step.status === 'done') right.innerHTML = `<p class="text-[13px] font-medium text-slate-950">${escapeHtml(step.label)}</p>${step.completedAtLabel ? `<p class="text-[11px] text-slate-400 mt-0.5">${escapeHtml(step.completedAtLabel)}</p>` : ''}`;
        else if (step.status === 'current') right.innerHTML = `<p class="text-[15px] font-semibold text-slate-950 tracking-tight">${escapeHtml(step.label)}</p>${step.startedAtLabel ? `<p class="text-[11px] text-slate-400 mt-0.5">${escapeHtml(step.startedAtLabel)}</p>` : ''}`;
        else right.innerHTML = `<p class="text-[14px] font-medium text-slate-400">${escapeHtml(step.label)}</p>`;
        if (ev && (step.status === 'current' || step.status === 'done')) right.appendChild(renderEvidenceCard(ev));
        li.appendChild(right); rail.appendChild(li);
      });
    }

    function renderEvidenceCard(ev) {
      const card = document.createElement('div'); card.className = 'mt-3 bg-white/88 backdrop-blur-xl border border-white rounded-[18px] p-3 shadow-[0_10px_28px_rgba(15,23,42,0.06)] ring-1 ring-slate-950/[0.035]';
      card.innerHTML = `<div class="flex items-center justify-between gap-2 mb-2"><p class="text-[12px] font-semibold text-slate-950">${escapeHtml(ev.title)}</p><span class="text-[11px] font-medium text-slate-400">${escapeHtml(ev.capturedAtLabel)}</span></div>`;
      if (ev.description) { const d = document.createElement('p'); d.className = 'text-[13px] text-slate-500 leading-[19px]'; d.textContent = ev.description; card.appendChild(d); }
      if (ev.photos?.length) {
        const pc = document.createElement('div'); pc.className = 'mt-3 flex gap-2';
        ev.photos.slice(0, 2).forEach((p, i) => {
          const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'group focus:outline-none rounded-xl focus-visible:ring-2 focus-visible:ring-[#16465B]/25 relative flex-shrink-0';
          btn.setAttribute('aria-label', `Lihat foto bukti ${i+1}`); btn.onclick = () => openLightbox(btn.querySelector('img'), i, ev);
          const img = document.createElement('img'); img.src = p.thumb; img.alt = `Bukti ${i+1}`; img.className = 'evidence-thumb w-14 h-14 rounded-xl object-cover bg-slate-100 transition-transform duration-200 group-active:scale-95';
          img.onerror = function() { this.style.display='none'; const ph = document.createElement('div'); ph.className='w-14 h-14 rounded-xl bg-slate-100 flex items-center justify-center'; ph.innerHTML='<iconify-icon icon="solar:gallery-broken" class="text-xl text-slate-300"></iconify-icon>'; btn.insertBefore(ph, btn.firstChild); };
          btn.appendChild(img);
          if (i === 1 && ev.photos.length > 2) { const ov = document.createElement('span'); ov.className='absolute inset-0 rounded-xl bg-slate-950/45 flex items-center justify-center text-white text-[11px] font-bold'; ov.textContent=`+${ev.photos.length-1}`; btn.appendChild(ov); }
          pc.appendChild(btn);
        });
        card.appendChild(pc);
      } else { const e = document.createElement('div'); e.className='mt-3 flex items-center gap-2 py-2'; e.innerHTML=`<iconify-icon icon="solar:camera-linear" class="text-base text-slate-300"></iconify-icon><p class="text-[12px] text-slate-400">Foto bukti belum diunggah</p>`; card.appendChild(e); }
      return card;
    }

    // ─── RENDER HELPERS ──────────────────────────────────────────────────────
    function renderAvatar(b) { const w = document.getElementById('avatar-wrapper'); if (!w) return; if (b.avatar_url) { const img = document.createElement('img'); img.src = b.avatar_url; img.alt = b.name||''; img.className = 'w-full h-full rounded-full object-cover'; img.onerror = function() { this.remove(); renderAvatarFallback(w, b.name); }; w.appendChild(img); } else renderAvatarFallback(w, b.name); }
    function renderAvatarFallback(w, n) { const f = document.createElement('div'); f.className='avatar-fallback'; f.textContent=(n||'?').charAt(0).toUpperCase(); w.appendChild(f); }

    // ─── SHARE ───────────────────────────────────────────────────────────────

    function copyFallback(url) { navigator.clipboard.writeText(url).then(()=>{ const btn=document.getElementById('btn-share'),icon=btn.querySelector('iconify-icon'); icon.setAttribute('icon','solar:check-circle-linear'); const tt=document.createElement('div'); tt.className='absolute -bottom-9 left-1/2 -translate-x-1/2 whitespace-nowrap text-[11px] font-semibold text-white bg-slate-800 rounded-lg px-3 py-1.5 shadow-lg pointer-events-none'; tt.textContent='Link disalin'; tt.style.opacity='0'; tt.style.transition='opacity 0.18s ease-out'; btn.style.position='relative'; btn.appendChild(tt); requestAnimationFrame(()=>{tt.style.opacity='1';}); setTimeout(()=>{icon.setAttribute('icon','solar:share-linear');tt.style.opacity='0';setTimeout(()=>tt.remove(),200);},2000); }).catch(()=>{}); }

    // ─── LIGHTBOX ────────────────────────────────────────────────────────────
    const lightbox=document.getElementById('lightbox'),lightboxStage=document.getElementById('lightbox-stage'),lightboxTrack=document.getElementById('lightbox-track'),lightboxFly=document.getElementById('lightbox-fly'),lightboxCaption=document.getElementById('lightbox-caption'),lightboxCaptionText=document.getElementById('lightbox-caption-text'),lightboxHelperText=document.getElementById('lightbox-helper-text'),lightboxCounter=document.getElementById('lightbox-counter'),lightboxDots=document.getElementById('lightbox-dots'),lightboxHandle=document.getElementById('lightbox-handle'),lightboxClose=document.getElementById('lightbox-close');
    let photoSet=[],rendered=false,isOpen=false,currentIndex=0,lastFocusedElement=null;

    let isPinching=false,pinchStartDistance=0,pinchStartScale=1,pinchStartMidX=0,pinchStartMidY=0,pinchBasePanX=0,pinchBasePanY=0,pinchPanStarted=false;const pinchPanThreshold=4;

    function renderSlides(){lightboxTrack.innerHTML=photoSet.map((p,i)=>`<div class="lightbox-slide"><div class="lightbox-card" data-card-index="${i}"><img class="lightbox-placeholder" src="${p.thumb}" alt="" draggable="false"><img class="lightbox-full" src="${p.src}" alt="Bukti ${i+1}" draggable="false" data-index="${i}"><div class="lightbox-shimmer" data-shimmer-index="${i}"></div></div></div>`).join('');lightboxTrack.querySelectorAll('.lightbox-full').forEach(img=>{const ml=()=>{img.classList.add('is-loaded');const s=lightboxTrack.querySelector(`.lightbox-shimmer[data-shimmer-index="${img.dataset.index}"]`);if(s)s.classList.add('is-hidden');};img.addEventListener('load',ml);img.addEventListener('error',()=>{img.classList.add('is-error');const s=lightboxTrack.querySelector(`.lightbox-shimmer[data-shimmer-index="${img.dataset.index}"]`);if(s)s.classList.add('is-hidden');});if(img.complete&&img.naturalWidth)ml();});photoSet.forEach(p=>{const pr=new Image();pr.src=p.src;});rendered=true;}
    function getStageWidth(){return lightboxStage.getBoundingClientRect().width||window.innerWidth;}

    function animateFly(sr,er,src,cb){lightboxFly.src=src;lightboxFly.style.transition='none';lightboxFly.style.opacity='1';lightboxFly.style.top=sr.top+'px';lightboxFly.style.left=sr.left+'px';lightboxFly.style.width=sr.width+'px';lightboxFly.style.height=sr.height+'px';lightboxFly.style.borderRadius='0.75rem';requestAnimationFrame(()=>{lightboxFly.style.transition='top 0.32s cubic-bezier(0.22,1,0.36,1),left 0.32s cubic-bezier(0.22,1,0.36,1),width 0.32s cubic-bezier(0.22,1,0.36,1),height 0.32s cubic-bezier(0.22,1,0.36,1),border-radius 0.32s cubic-bezier(0.22,1,0.36,1),opacity 0.20s ease-out';lightboxFly.style.top=er.top+'px';lightboxFly.style.left=er.left+'px';lightboxFly.style.width=er.width+'px';lightboxFly.style.height=er.height+'px';lightboxFly.style.borderRadius='1rem';});setTimeout(()=>{if(cb)cb();},340);}
    function trapFocus(e){if(!isOpen||e.key!=='Tab')return;const f=lightbox.querySelectorAll('button:not([disabled])');if(!f.length)return;const first=f[0],last=f[f.length-1];if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}else{if(document.activeElement===last){e.preventDefault();first.focus();}}}

    function openLightbox(button,index,evidence){lastFocusedElement=document.activeElement;if(evidence?.photos)photoSet=evidence.photos;rendered=false;renderSlides();currentIndex=index;isOpen=true;lightbox.style.opacity='';lightbox.style.backgroundColor='';lightbox.style.transition='';lightboxStage.style.transition='';lightboxStage.style.transform='';lightboxTrack.style.transition='';lightboxTrack.style.opacity='';document.body.style.overflow='hidden';resetUiAndStage();updateMeta();resetZoom(false);setUiOpacity(0,true);lightbox.classList.remove('opacity-0','pointer-events-none');lightbox.classList.add('opacity-100');setTrackPosition(0,false);const thumb=button||getThumb(index);const sr=thumb.getBoundingClientRect();const card=getCurrentCard();lightboxTrack.style.opacity='1';if(card){card.style.transition='none';card.style.opacity='0';}requestAnimationFrame(()=>{const er=card.getBoundingClientRect();animateFly(sr,er,photoSet[index].thumb,()=>{if(card){card.style.transition='none';card.style.opacity='1';}lightboxFly.style.transition='none';lightboxFly.style.opacity='0';requestAnimationFrame(()=>{lightboxFly.style.transition='';if(card)card.style.transition='';setTrackPosition(0,true);setTimeout(()=>{setUiOpacity(1);lightboxClose.focus();},70);});setTimeout(()=>{if(card)card.style.opacity='';},180);});});document.addEventListener('keydown',trapFocus);}
    function closeLightbox(){if(!isOpen)return;document.removeEventListener('keydown',trapFocus);const card=getCurrentCard(),thumb=getThumb(currentIndex);if(!card||!thumb){lightbox.classList.add('opacity-0','pointer-events-none');lightbox.classList.remove('opacity-100');document.body.style.overflow='';resetZoom(false);setTrackPosition(0,false);resetUiAndStage();isOpen=false;if(lastFocusedElement){lastFocusedElement.focus();lastFocusedElement=null;}return;}const sr=card.getBoundingClientRect(),er=thumb.getBoundingClientRect();const clone=card.cloneNode(true);clone.removeAttribute('data-card-index');clone.classList.add('no-anim');Object.assign(clone.style,{position:'fixed',zIndex:'9999',top:sr.top+'px',left:sr.left+'px',width:sr.width+'px',height:sr.height+'px',margin:'0',transform:'none',transformOrigin:'center center',pointerEvents:'none',opacity:'1',borderRadius:'1rem',boxShadow:'0 30px 90px rgba(0,0,0,0.40)'});document.body.appendChild(clone);lightboxTrack.classList.remove('no-anim');lightboxFly.style.opacity='0';requestAnimationFrame(()=>{requestAnimationFrame(()=>{lightboxTrack.style.opacity='0';setUiOpacity(0);lightbox.style.transition='opacity 0.30s ease-out,background-color 0.30s ease-out';lightbox.style.backgroundColor='rgba(2,6,23,0)';lightbox.style.opacity='0';clone.classList.remove('no-anim');clone.style.transition='top 0.32s cubic-bezier(0.22,1,0.36,1),left 0.32s cubic-bezier(0.22,1,0.36,1),width 0.32s cubic-bezier(0.22,1,0.36,1),height 0.32s cubic-bezier(0.22,1,0.36,1),opacity 0.24s ease-out,border-radius 0.32s cubic-bezier(0.22,1,0.36,1),box-shadow 0.32s cubic-bezier(0.22,1,0.36,1)';Object.assign(clone.style,{top:er.top+'px',left:er.left+'px',width:er.width+'px',height:er.height+'px',borderRadius:'0.75rem',boxShadow:'0 10px 28px rgba(15,23,42,0.12)',opacity:'0'});});});setTimeout(()=>{clone.remove();lightbox.classList.add('opacity-0','pointer-events-none');lightbox.classList.remove('opacity-100');document.body.style.overflow='';lightboxTrack.style.opacity='';resetZoom(false);setTrackPosition(0,false);resetUiAndStage();dragX=0;dragY=0;gesture=null;isOpen=false;if(lastFocusedElement){lastFocusedElement.focus();lastFocusedElement=null;}},360);}
    function closeLightboxFromDrag(){if(!isOpen)return;document.removeEventListener('keydown',trapFocus);const card=getCurrentCard(),thumb=getThumb(currentIndex);if(!card||!thumb){lightbox.classList.add('opacity-0','pointer-events-none');lightbox.classList.remove('opacity-100');document.body.style.overflow='';resetZoom(false);setTrackPosition(0,false);resetUiAndStage();isOpen=false;if(lastFocusedElement){lastFocusedElement.focus();lastFocusedElement=null;}return;}const sr=card.getBoundingClientRect(),er=thumb.getBoundingClientRect();const clone=card.cloneNode(true);clone.removeAttribute('data-card-index');clone.classList.add('no-anim');Object.assign(clone.style,{position:'fixed',zIndex:'9999',top:sr.top+'px',left:sr.left+'px',width:sr.width+'px',height:sr.height+'px',margin:'0',transform:'none',transformOrigin:'center center',pointerEvents:'none',opacity:'1',borderRadius:'1rem',boxShadow:'0 30px 90px rgba(0,0,0,0.40)'});document.body.appendChild(clone);lightboxTrack.classList.remove('no-anim');lightboxFly.style.opacity='0';requestAnimationFrame(()=>{requestAnimationFrame(()=>{lightboxTrack.style.opacity='0';lightboxStage.style.transform='';setUiOpacity(0);lightbox.style.transition='opacity 0.30s ease-out,background-color 0.30s ease-out';lightbox.style.backgroundColor='rgba(2,6,23,0)';lightbox.style.opacity='0';clone.classList.remove('no-anim');clone.style.transition='top 0.34s cubic-bezier(0.22,1,0.36,1),left 0.34s cubic-bezier(0.22,1,0.36,1),width 0.34s cubic-bezier(0.22,1,0.36,1),height 0.34s cubic-bezier(0.22,1,0.36,1),opacity 0.24s ease-out,border-radius 0.34s cubic-bezier(0.22,1,0.36,1),box-shadow 0.34s cubic-bezier(0.22,1,0.36,1)';Object.assign(clone.style,{top:er.top+'px',left:er.left+'px',width:er.width+'px',height:er.height+'px',borderRadius:'0.75rem',boxShadow:'0 10px 28px rgba(15,23,42,0.12)',opacity:'0'});});});setTimeout(()=>{clone.remove();lightbox.classList.add('opacity-0','pointer-events-none');lightbox.classList.remove('opacity-100');document.body.s     function goToPhoto(n){if(n<0||n>=photoSet.length){setTrackPosition(0,true);return;}resetZoom(false);currentIndex=n;updateMeta();setTrackPosition(0,true);}
    function setDragDown(y){const p=Math.min(Math.max(y/280,0),1);lightboxStage.style.transform=`translate3d(0,${y}px,0) scale(${1-p*0.13})`;lightbox.style.backgroundColor=`rgba(2,6,23,${0.60*(1-p*0.72)})`;setUiOpacity(Math.max(0,1-p*2));}
    function resetDragDown(){lightboxStage.style.transition='transform 0.24s cubic-bezier(0.22,1,0.36,1)';lightbox.style.transition='background-color 0.24s cubic-bezier(0.22,1,0.36,1),opacity 0.24s ease-out';lightboxStage.style.transform='';lightbox.style.backgroundColor='';setUiOpacity(1);setTimeout(()=>{lightboxStage.style.transition='';lightbox.style.transition='';},260);}

    lightboxStage.addEventListener('touchstart',(e)=>{if(!isOpen)return;moved=false;gesture=null;dragX=0;dragY=0;if(e.touches.length===2){const mid=getMid(e.touches);if(!areTouchesInside(e.touches)){isPinching=false;return;}isPinching=true;pinchStartDistance=getDist(e.touches);pinchStartScale=scale;pinchStartMidX=mid.x;pinchStartMidY=mid.y;pinchBasePanX=panX;pinchBasePanY=panY;pinchPanStarted=false;if(scale<=1.06)setOrigin(mid.x,mid.y);const card=getCurrentCard();if(card){card.classList.add('no-anim');card.style.transition='none';}e.preventDefault();return;}if(e.touches.length===1){const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;touchStartedInsidePhoto=isPointInside(t.clientX,t.clientY);panStartX=t.clientX;panStartY=t.clientY;panBaseX=panX;panBaseY=panY;if(scale>1){const card=getCurrentCard();if(card){card.classList.add('no-anim');card.style.transition='none';}}}},{passive:false});

    lightboxStage.addEventListener('touchend',(e)=>{if(!isOpen)return;if(isPinching){isPinching=false;pinchPanStarted=false;const card=getCurrentCard();if(card){card.classList.remove('no-anim');card.style.transition='';}if(scale<=1.06){scale=1;panX=0;panY=0;const c=getCurrentCard();if(c){c.style.transition='transform 0.32s cubic-bezier(0.22,1,0.36,1)';c.style.transformOrigin='center center';c.style.transform='translate3d(0px,0px,0) scale(1)';setTimeout(()=>{c.style.transition='';},340);}}else if(scale>5){scale=5;applyZoom(true);}else{applyDampedPan(panX,panY);applyZoom(true);}return;}if(scale>1){const card=getCurrentCard();if(card){card.classList.remove('no-anim');card.style.transition='';}}const now=Date.now();const isTap=!moved&&!gesture&&Math.abs(dragX)<8&&Math.abs(dragY)<8;if(isTap){if(!touchStartedInsidePhoto){closeLightbox();e.preventDefault();return;}const isDbl=now-lastTapTime<320&&Math.abs(touchStartX-lastTapX)<40&&Math.abs(touchStartY-lastTapY)<40;if(isDbl){toggleZoom(touchStartX,touchStartY);lastTapTime=0;e.preventDefault();return;}lastTapTime=now;lastTapX=touchStartX;lastTapY=touchStartY;}if(gesture==='dragClose'){if(dragY>120)closeLightboxFromDrag();else resetDragDown();}if(gesture==='swipe'){if(dragX<-64)goToPhoto(currentIndex+1);else if(dragX>64)goToPhoto(currentIndex-1);else setTrackPosition(0,true);}gesture=null;dragX=0;dragY=0;lightboxTrack.classList.remove('no-anim');getCurrentCard()?.classList.remove('no-anim');},{passive:false});
