<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statusin — Guest Status Link View</title>

  <!-- Open Graph — nilai diisi server-side dari data journey -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Statusin" />
  <meta property="og:title" content="{{journey.title}} — {{business.name}}" />
  <meta property="og:description" content="{{journey.current_label}} · Case #{{journey.case_number}} · {{journey.freshness_line}}" />
  <meta property="og:image" content="{{og_image_url}}" />
  <meta property="og:url" content="{{canonical_url}}" />
  <meta name="twitter:card" content="summary_large_image" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ─── Reduced Motion ──────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      #lightbox-fly,
      .lightbox-card,
      #lightbox-track {
        transition: none !important;
      }
    }
  </style>

  <style>
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    #lightbox {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: contain;
      touch-action: none;
    }

    #lightbox-stage {
      will-change: transform;
    }

    #lightbox-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    #lightbox-track.no-anim {
      transition: none;
    }

    .lightbox-slide {
      width: 100%;
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 16px;
      padding-right: 16px;
    }

    .lightbox-card {
      position: relative;
      width: min(86vw, 520px);
      aspect-ratio: 3 / 2;
      border-radius: 1rem;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 30px 90px rgba(0,0,0,0.40);
      transform-origin: center center;
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    /* Landscape: make card fit the shorter viewport height */
    @media (orientation: landscape) and (max-height: 500px) {
      .lightbox-card {
        width: min(60vw, 480px);
        aspect-ratio: 16 / 9;
      }

      #lightbox-caption {
        bottom: 6px;
        padding-left: 1rem;
        padding-right: 1rem;
      }

      #lightbox-caption p.text-\\[13px\\] {
        font-size: 11px;
      }

      #lightbox-caption #lightbox-caption-text {
        font-size: 10px;
        max-height: 2.4em;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      #lightbox-caption #lightbox-helper-text {
        display: none;
      }

      #lightbox-dots {
        bottom: 68px;
      }
    }

    .lightbox-card.no-anim {
      transition: none;
    }

    .lightbox-placeholder,
    .lightbox-full {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-placeholder {
      filter: blur(18px);
      transform: scale(1.06);
      opacity: 0.58;
    }

    .lightbox-full {
      opacity: 0;
      transition: opacity 0.22s ease-out;
    }

    .lightbox-full.is-loaded {
      opacity: 1;
    }

    /* Image load error state */
    .lightbox-full.is-error {
      opacity: 1;
      object-fit: none;
      background: rgba(255,255,255,0.04);
    }

    .lightbox-shimmer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
    }

    .lightbox-shimmer::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      animation: shimmer 1.4s infinite;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
    }

    .lightbox-shimmer.is-hidden {
      display: none;
    }

    .lightbox-ui {
      transition: opacity 0.22s ease-out;
    }

    #lightbox-fly {
      position: fixed;
      z-index: 140;
      object-fit: cover;
      border-radius: 0.75rem;
      box-shadow: 0 30px 90px rgba(0,0,0,0.40);
      pointer-events: none;
      opacity: 0;
      transition:
        top 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        left 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        width 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        height 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        border-radius 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.20s ease-out;
    }

    /* Avatar fallback initial */
    .avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border-radius: 9999px;
      background: #16465B;
      color: white;
      font-weight: 700;
      font-size: 1.125rem;
      text-transform: uppercase;
    }
  </style>

</head>

<body class="min-h-screen bg-white px-4 sm:px-6 pt-0 pb-8 overflow-x-hidden">

  <!-- White iOS-like ambience: mostly white, very soft depth only -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute -top-40 -left-32 w-[560px] h-[560px] rounded-full blur-[140px] bg-[#F6F1EA]/70"></div>
    <div class="absolute -bottom-44 -right-28 w-[620px] h-[620px] rounded-full blur-[150px] bg-[#FF5A5F]/7"></div>
    <div class="absolute top-[32%] left-[52%] -translate-x-1/2 w-[420px] h-[420px] rounded-full blur-[130px] bg-[#16465B]/4"></div>
  </div>

  <!-- Guest Status Link View -->
  <main class="relative z-10 w-full max-w-[560px] mx-auto">
    <div class="isolate flex flex-col w-full mx-auto relative bg-transparent text-slate-950">

      <!-- Header Profile: sticky web header -->
      <div class="sticky top-0 z-50 -mx-4 sm:-mx-6 px-5 sm:px-6 py-4 flex items-center justify-between bg-white/78 backdrop-blur-2xl border-b border-slate-950/[0.04] shadow-[0_10px_34px_rgba(15,23,42,0.045)]">
        <button class="flex items-center gap-3 text-left group focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25 rounded-2xl transition-all" aria-label="Profil bisnis">
          <div id="avatar-wrapper" class="w-12 h-12 rounded-full bg-white p-[2px] group-active:scale-95 transition-transform duration-200 shadow-[0_12px_30px_rgba(15,23,42,0.12)] ring-1 ring-slate-950/[0.06]">
            <!-- Avatar or fallback injected by JS -->
          </div>
          <div>
            <h2 id="business-name" class="text-base font-bold tracking-tight transition-colors text-slate-950 group-hover:text-slate-700"></h2>
            <p id="case-number" class="text-xs font-medium mt-0.5 transition-colors text-slate-500 group-hover:text-[#16465B]"></p>
          </div>
        </button>

        <button id="btn-share" class="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-all focus:outline-none focus-visible:ring-2 bg-white/86 hover:bg-white active:bg-slate-100 focus-visible:ring-[#16465B]/20 border border-white shadow-[0_8px_20px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.04]" aria-label="Bagikan link status">
          <iconify-icon icon="solar:share-linear" class="text-lg text-[#16465B]"></iconify-icon>
        </button>
      </div>

      <!-- Main Content -->
      <div class="relative z-20 px-1 sm:px-0 space-y-5 pt-5 pb-10">

        <!-- Case Title -->
        <section aria-labelledby="journey-title">
          <p id="current-label" class="text-[11px] font-bold tracking-[0.16em] uppercase text-[#16465B] mb-2"></p>
          <h1 id="journey-title" class="text-2xl font-extrabold text-slate-950 tracking-tight leading-tight"></h1>
          <p id="journey-complaint" class="text-[14px] text-slate-500 font-medium leading-snug mt-1"></p>
        </section>

        <!-- Certainty Panel -->
        <section class="bg-white/86 backdrop-blur-2xl border border-white rounded-[1.75rem] p-5 shadow-[0_18px_54px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.045]" aria-label="Ringkasan kepastian layanan">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 ring-1 ring-blue-100 shrink-0" aria-hidden="true">
              <iconify-icon icon="solar:shield-check-bold-duotone" class="text-xl"></iconify-icon>
            </div>
            <div>
              <p class="text-[10px] text-[#16465B] font-extrabold uppercase tracking-wider mb-0.5">
                Status Saat Ini
              </p>
              <p id="status-headline" class="text-slate-950 font-bold text-base leading-tight"></p>
              <p id="status-description" class="text-[13px] text-slate-500 leading-[19px] mt-1"></p>
            </div>
          </div>

          <div class="bg-[#F8FAFC]/82 backdrop-blur-xl rounded-2xl p-4 border border-slate-950/[0.04] space-y-3 shadow-inner">
            <div class="flex justify-between items-center">
              <span id="responsibility-label" class="text-slate-500 text-xs font-semibold"></span>
              <span id="responsibility-badge" class="text-xs font-bold px-2.5 py-1 bg-[#16465B]/8 text-[#16465B] rounded-lg"></span>
            </div>

            <div class="flex justify-between items-center">
              <span class="text-slate-500 text-xs font-semibold">Terakhir Update</span>
              <span id="freshness-line" class="text-slate-950 text-xs font-bold"></span>
            </div>

            <div class="h-px bg-slate-200/80 w-full my-2"></div>

            <!-- Integrated next expectation -->
            <div id="next-update-row" class="flex gap-3 items-start">
              <div class="mt-0.5 w-6 h-6 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0" aria-hidden="true">
                <iconify-icon icon="solar:clock-circle-bold" class="text-sm"></iconify-icon>
              </div>
              <div>
                <p id="next-update-label" class="text-[14px] font-bold text-slate-900 leading-[20px]"></p>
                <p id="next-expectation-note" class="text-[13px] text-slate-500 leading-[19px] mt-1"></p>
              </div>
            </div>
          </div>
        </section>

        <!-- Status Rail (rendered by JS as ordered list) -->
        <section aria-label="Progress layanan">
          <h3 class="text-[13px] font-semibold text-[#16465B] mb-5">
            Progress layanan
          </h3>
          <ol id="status-rail" class="relative list-none p-0 m-0" role="list">
            <!-- Nodes injected by renderStatusRail() -->
          </ol>
        </section>

        <!-- Footer -->
        <footer class="pt-10 pb-8 text-center space-y-4">
          <!-- CTA: WhatsApp contact -->
          <a id="cta-whatsapp" href="#" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full border border-slate-200 bg-white/80 backdrop-blur-xl shadow-[0_4px_16px_rgba(15,23,42,0.06)] hover:shadow-[0_8px_24px_rgba(15,23,42,0.10)] hover:border-slate-300 active:scale-[0.97] transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25">
            <iconify-icon icon="solar:chat-round-dots-linear" class="text-lg text-[#16465B]"></iconify-icon>
            <span id="cta-whatsapp-text" class="text-[13px] font-semibold text-slate-700"></span>
          </a>

          <div>
            <p class="text-xs font-semibold text-slate-400 mb-0.5 tracking-wide">
              Statusin
            </p>
            <p class="text-xs text-slate-400 opacity-80">
              Kepastian untuk setiap layanan
            </p>
          </div>
        </footer>

      </div>
    </div>
  </main>

  <!-- Image Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-[100] opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-950/60 backdrop-blur-xl overflow-hidden" role="dialog" aria-modal="true" aria-label="Galeri foto bukti">
    <!-- Drag handle -->
    <div id="lightbox-handle" class="lightbox-ui absolute top-3 left-1/2 -translate-x-1/2 w-10 h-1 rounded-full bg-white/30 z-20" aria-hidden="true"></div>

    <button type="button" onclick="closeLightbox()" aria-label="Tutup galeri foto" id="lightbox-close" class="lightbox-ui absolute top-5 right-5 w-10 h-10 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 active:scale-90 transition-all text-white z-20">
      <iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon>
    </button>

    <!-- Photo counter (aria-live for screen readers) -->
    <div id="lightbox-counter" class="lightbox-ui absolute top-6 left-1/2 -translate-x-1/2 text-xs font-semibold text-white/80 bg-white/10 rounded-full px-3 py-1 z-20" aria-live="polite" aria-atomic="true">
      1 / 2
    </div>

    <div id="lightbox-stage" class="absolute inset-0 flex items-center justify-center overflow-hidden">
      <div id="lightbox-track">
        <!-- Slides injected by JS -->
      </div>
    </div>

    <!-- Shared element transition layer -->
    <img id="lightbox-fly" src="" alt="" draggable="false" aria-hidden="true">

    <!-- Dot indicators -->
    <div id="lightbox-dots" class="lightbox-ui absolute bottom-40 left-1/2 -translate-x-1/2 flex gap-1.5 z-20" aria-hidden="true"></div>

    <div id="lightbox-caption" class="lightbox-ui absolute bottom-14 left-1/2 -translate-x-1/2 text-center px-6 w-full max-w-[560px] z-20">
      <p class="text-[13px] font-semibold text-white">Catatan teknisi</p>
      <p id="lightbox-caption-text" class="text-xs text-white/70 mt-1 leading-relaxed"></p>
      <p id="lightbox-helper-text" class="text-[11px] text-white/50 mt-2">
        Cubit untuk memperbesar &middot; Geser untuk melihat foto lain
      </p>
    </div>
  </div>

  <script>
    // ─── DATA LAYER ──────────────────────────────────────────────────────────
    // Template-ready structure. Inject dari backend saat production.
    // Steps menggunakan label universal lintas industri.
    const PAGE_DATA = {
      business: {
        name: "iRepair Jakarta",
        avatar_url: "https://i.pravatar.cc/150?u=irepair-jakarta",
        whatsapp_number: "+6281211112222",
      },
      journey: {
        case_number: "SRV-681657",
        title: "Service iPhone 11",
        complaint: "Keluhan: Mati total, layar retak",
        status_headline: "Sedang diperiksa teknisi",
        status_description: "Teknisi sedang mengecek komponen utama perangkat Anda.",
        responsibility_label: "Menunggu",
        responsibility_badge: "Teknisi",
        freshness_line: "Baru saja",
        next_update_at: "2026-06-05T17:00:00+07:00",
        next_expectation_note: "Estimasi biaya akan muncul setelah pengecekan selesai.",
        guest_url: window.location.href,
      },
      service: {
        id: "case-681657",
        title: "Service iPhone 11",
        currentStepIndex: 1,
        currentStepKey: "initial_check",
      },
      steps: [
        {
          key: "service_received",
          label: "Layanan Diterima",
          status: "done",
          completedAtLabel: "Hari ini, 09.12",
        },
        {
          key: "initial_check",
          label: "Pemeriksaan Awal",
          status: "current",
          startedAtLabel: "Dimulai hari ini, 10.45",
        },
        {
          key: "cost_approval",
          label: "Persetujuan Biaya",
          status: "next",
        },
        {
          key: "in_progress",
          label: "Sedang Diproses",
          status: "upcoming",
        },
        {
          key: "final_check",
          label: "Pemeriksaan Akhir",
          status: "upcoming",
        },
        {
          key: "ready_for_pickup",
          label: "Siap Diambil",
          status: "upcoming",
        },
        {
          key: "completed",
          label: "Layanan Selesai",
          status: "upcoming",
        },
      ],
      // Trust Evidence Slots — foto bukti yang melekat pada step tertentu.
      // Primary slot: initial_check
      // Secondary slots: cost_approval, final_check / ready_for_pickup
      evidencePhotos: [
        {
          id: "ev-001",
          stepKey: "initial_check",
          title: "Catatan teknisi",
          description: "Foto kondisi perangkat setelah casing dibuka. Teknisi sedang mengecek jalur power dan konektor baterai.",
          capturedAtLabel: "12 mnt lalu",
          visibleToCustomer: true,
          photos: [
            {
              src: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=1200",
              thumb: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=240",
              caption: "Foto kondisi perangkat setelah casing dibuka. Teknisi sedang mengecek jalur power dan konektor baterai.",
            },
            {
              src: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=1200",
              thumb: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=240",
              caption: "Pemeriksaan komponen internal lebih lanjut pada papan logic board.",
            },
          ],
        },
      ],
    };

    // ─── AUTO-REFRESH (SILENT) ───────────────────────────────────────────────
    // Background-only refresh. No visible UI — customer doesn't need to know.
    const REFRESH_INTERVAL_MS = 90000; // 90 seconds
    let lastLoadedAt = new Date();
    let refreshTimer = null;

    function performSilentRefresh() {
      // Production: fetch fresh data from API, then re-render without page reload.
      // Example:
      //   const res = await fetch(`/api/guest/${token}`);
      //   const freshData = await res.json();
      //   Object.assign(PAGE_DATA.journey, freshData.journey);
      //   PAGE_DATA.steps = freshData.steps;
      //   PAGE_DATA.evidencePhotos = freshData.evidencePhotos;
      //   renderPage();
      //
      // For template/demo: no-op (uncomment above when API is ready)
      lastLoadedAt = new Date();
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => {
        if (!document.hidden) {
          performSilentRefresh();
        }
      }, REFRESH_INTERVAL_MS);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    // Refresh when tab becomes visible again (if stale > 60s)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        const elapsed = Date.now() - lastLoadedAt.getTime();
        if (elapsed > 60000) {
          performSilentRefresh();
        }
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    });

    // ─── WINDOWED RAIL LOGIC ─────────────────────────────────────────────────
    // Progressive reveal: tampilkan dari awal sampai current + 1, minimal 3 node.
    function getVisibleSteps(steps, currentStepIndex) {
      const lastIndex = steps.length - 1;
      const end = Math.min(Math.max(currentStepIndex + 1, 2), lastIndex);
      return steps.slice(0, end + 1);
    }

    // ─── GET EVIDENCE FOR STEP ───────────────────────────────────────────────
    function getEvidenceForStep(stepKey) {
      if (!PAGE_DATA.evidencePhotos || !PAGE_DATA.evidencePhotos.length) return null;
      return PAGE_DATA.evidencePhotos.find(
        (ev) => ev.stepKey === stepKey && ev.visibleToCustomer
      ) || null;
    }

    // ─── RENDER STATUS RAIL ──────────────────────────────────────────────────
    function renderStatusRail() {
      const { steps, service } = PAGE_DATA;

      if (!steps || !steps.length) {
        // Empty state: hide rail section entirely
        const railSection = document.getElementById('status-rail')?.closest('section');
        if (railSection) railSection.style.display = 'none';
        return;
      }

      const visibleSteps = getVisibleSteps(steps, service.currentStepIndex);
      const railEl = document.getElementById('status-rail');
      railEl.innerHTML = '';

      visibleSteps.forEach((step, index) => {
        const isLast = index === visibleSteps.length - 1;
        const evidence = getEvidenceForStep(step.key);

        const node = document.createElement('li');
        node.className = `relative flex gap-4 ${isLast ? '' : 'pb-7'}`;

        // Accessibility: mark current step
        if (step.status === 'current') {
          node.setAttribute('aria-current', 'step');
        }

        // Left column: icon + connector line
        const leftCol = document.createElement('div');
        leftCol.className = 'relative w-6 shrink-0 flex justify-center';
        leftCol.setAttribute('aria-hidden', 'true');

        if (step.status === 'done') {
          leftCol.innerHTML = `
            <iconify-icon icon="solar:check-circle-bold" class="relative z-10 text-[21px] text-slate-400/50"></iconify-icon>
            ${!isLast ? '<div class="absolute top-[21px] -bottom-7 w-px bg-slate-200"></div>' : ''}
          `;
        } else if (step.status === 'current') {
          leftCol.innerHTML = `
            <div class="relative z-10 w-[20px] h-[20px] min-w-[20px] min-h-[20px] shrink-0 mt-0.5 rounded-full bg-blue-500 border-[3px] border-white shadow-[0_0_0_4px_rgba(59,130,246,0.15)]"></div>
            ${!isLast ? '<div class="absolute top-[24px] -bottom-7 w-px bg-slate-200"></div>' : ''}
          `;
        } else {
          leftCol.innerHTML = `
            <div class="relative z-10 w-[20px] h-[20px] min-w-[20px] min-h-[20px] shrink-0 mt-0.5 rounded-full border-2 border-slate-200 bg-white"></div>
            ${!isLast ? '<div class="absolute top-[24px] -bottom-7 w-px bg-slate-200"></div>' : ''}
          `;
        }

        node.appendChild(leftCol);

        // Right column: content
        const rightCol = document.createElement('div');
        rightCol.className = 'min-w-0 flex-1';

        if (step.status === 'done') {
          rightCol.innerHTML = `
            <p class="text-[13px] font-medium text-slate-950">${escapeHtml(step.label)}</p>
            ${step.completedAtLabel ? `<p class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(step.completedAtLabel)}</p>` : ''}
          `;
        } else if (step.status === 'current') {
          rightCol.innerHTML = `
            <p class="text-[15px] font-semibold text-slate-950 tracking-tight">${escapeHtml(step.label)}</p>
            ${step.startedAtLabel ? `<p class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(step.startedAtLabel)}</p>` : ''}
          `;
        } else {
          rightCol.innerHTML = `
            <p class="text-[14px] font-medium text-slate-500 opacity-70">${escapeHtml(step.label)}</p>
          `;
        }

        // Attach evidence card if this step has one
        if (evidence && (step.status === 'current' || step.status === 'done')) {
          const evidenceCard = renderEvidenceCard(evidence);
          rightCol.appendChild(evidenceCard);
        }

        node.appendChild(rightCol);
        railEl.appendChild(node);
      });
    }

    // ─── RENDER EVIDENCE CARD ────────────────────────────────────────────────
    function renderEvidenceCard(evidence) {
      const card = document.createElement('div');
      card.className = 'mt-3 bg-white/88 backdrop-blur-xl border border-white rounded-[18px] p-3 shadow-[0_10px_28px_rgba(15,23,42,0.06)] ring-1 ring-slate-950/[0.035]';

      // Header
      const header = document.createElement('div');
      header.className = 'flex items-center justify-between gap-2 mb-2';
      header.innerHTML = `
        <p class="text-[12px] font-semibold text-slate-950">${escapeHtml(evidence.title)}</p>
        <span class="text-[11px] font-semibold text-slate-500">${escapeHtml(evidence.capturedAtLabel)}</span>
      `;
      card.appendChild(header);

      // Description
      if (evidence.description) {
        const desc = document.createElement('p');
        desc.className = 'text-[13px] text-slate-500 leading-[19px]';
        desc.textContent = evidence.description;
        card.appendChild(desc);
      }

      // Photos or empty state
      if (evidence.photos && evidence.photos.length > 0) {
        const photosContainer = document.createElement('div');
        photosContainer.className = 'mt-3 flex gap-2';

        const MAX_VISIBLE = 2;
        evidence.photos.slice(0, MAX_VISIBLE).forEach((photo, index) => {
          const isLast = index === MAX_VISIBLE - 1 && evidence.photos.length > MAX_VISIBLE;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'group focus:outline-none rounded-xl focus-visible:ring-2 focus-visible:ring-[#16465B]/25 relative flex-shrink-0';
          btn.setAttribute('aria-label', `Lihat foto bukti ${index + 1} dari ${evidence.photos.length}`);
          btn.onclick = () => openLightbox(btn.querySelector('img'), index, evidence);
          const img = document.createElement('img');
          img.src = photo.thumb;
          img.alt = `Bukti ${index + 1}`;
          img.className = 'evidence-thumb w-14 h-14 rounded-xl object-cover bg-slate-100 transition-transform duration-200 group-active:scale-95 group-hover:opacity-90';
          // Fallback for broken thumb
          img.onerror = function() {
            this.style.display = 'none';
            const placeholder = document.createElement('div');
            placeholder.className = 'w-14 h-14 rounded-xl bg-slate-100 flex items-center justify-center';
            placeholder.innerHTML = '<iconify-icon icon="solar:gallery-broken" class="text-xl text-slate-300"></iconify-icon>';
            btn.insertBefore(placeholder, btn.firstChild);
          };
          btn.appendChild(img);
          if (isLast) {
            const overlay = document.createElement('span');
            overlay.className = 'absolute inset-0 rounded-xl bg-slate-950/45 flex items-center justify-center text-white text-[11px] font-bold';
            overlay.textContent = `+${evidence.photos.length - MAX_VISIBLE + 1}`;
            btn.appendChild(overlay);
          }
          photosContainer.appendChild(btn);
        });

        card.appendChild(photosContainer);
      } else {
        const emptyState = document.createElement('div');
        emptyState.className = 'mt-3 flex items-center gap-2 py-2';
        emptyState.innerHTML = `
          <iconify-icon icon="solar:camera-linear" class="text-base text-slate-300"></iconify-icon>
          <p class="text-[12px] text-slate-400">Foto bukti belum diunggah teknisi</p>
        `;
        card.appendChild(emptyState);
      }

      return card;
    }

    // ─── UTILITY: HTML ESCAPE ────────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── FORMAT NEXT UPDATE ──────────────────────────────────────────────────
    function formatNextUpdate(isoString) {
      if (!isoString) return null;
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return null;
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta' });
      return isToday
        ? `Update berikutnya diperkirakan hari ini pk ${timeStr}`
        : `Update berikutnya: ${date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Asia/Jakarta' })} pk ${timeStr}`;
    }

    // ─── RENDER AVATAR ───────────────────────────────────────────────────────
    function renderAvatar(business) {
      const wrapper = document.getElementById('avatar-wrapper');
      if (!wrapper) return;

      if (business.avatar_url) {
        const img = document.createElement('img');
        img.src = business.avatar_url;
        img.alt = business.name || 'Profile';
        img.className = 'w-full h-full rounded-full object-cover';
        img.onerror = function() {
          // Fallback to initial on load error
          this.remove();
          renderAvatarFallback(wrapper, business.name);
        };
        wrapper.appendChild(img);
      } else {
        renderAvatarFallback(wrapper, business.name);
      }
    }

    function renderAvatarFallback(wrapper, name) {
      const initial = (name || '?').charAt(0).toUpperCase();
      const fallback = document.createElement('div');
      fallback.className = 'avatar-fallback';
      fallback.textContent = initial;
      fallback.setAttribute('aria-label', name || 'Bisnis');
      wrapper.appendChild(fallback);
    }

    // ─── RENDER WHATSAPP CTA ─────────────────────────────────────────────────
    function renderWhatsAppCta(business) {
      const ctaLink = document.getElementById('cta-whatsapp');
      const ctaText = document.getElementById('cta-whatsapp-text');
      if (!ctaLink || !ctaText) return;

      if (business.whatsapp_number) {
        const cleanNumber = business.whatsapp_number.replace(/[^0-9]/g, '');
        ctaLink.href = `https://wa.me/${cleanNumber}`;
        ctaText.textContent = `Tanya ${business.name || 'Admin'} via WhatsApp`;
        ctaLink.style.display = '';
      } else {
        // Hide CTA if no WhatsApp number
        ctaLink.style.display = 'none';
      }
    }

    // ─── RENDER PAGE ─────────────────────────────────────────────────────────
    function renderPage() {
      const { business, journey, service, steps } = PAGE_DATA;

      // Derive current label from steps
      const currentStep = steps && steps[service.currentStepIndex];
      const currentLabel = currentStep ? currentStep.label : '';

      // Header — avatar with fallback
      renderAvatar(business);
      document.getElementById('business-name').textContent = business.name || '';
      document.getElementById('case-number').textContent = journey.case_number ? `Case #${journey.case_number}` : '';

      // Case title
      document.getElementById('current-label').textContent = currentLabel;
      document.getElementById('journey-title').textContent = journey.title || '';

      // Complaint — hide if empty
      const complaintEl = document.getElementById('journey-complaint');
      if (journey.complaint) {
        complaintEl.textContent = journey.complaint;
        complaintEl.style.display = '';
      } else {
        complaintEl.style.display = 'none';
      }

      // Certainty panel
      document.getElementById('status-headline').textContent = journey.status_headline || '';
      document.getElementById('status-description').textContent = journey.status_description || '';
      document.getElementById('responsibility-label').textContent = journey.responsibility_label || '';
      document.getElementById('responsibility-badge').textContent = journey.responsibility_badge || '';
      document.getElementById('freshness-line').textContent = journey.freshness_line || '—';

      // Next update — hide row entirely if no data
      const nextUpdateLabel = formatNextUpdate(journey.next_update_at);
      const nextUpdateRow = document.getElementById('next-update-row');
      if (nextUpdateLabel || journey.next_expectation_note) {
        nextUpdateRow.style.display = '';
        document.getElementById('next-update-label').textContent = nextUpdateLabel || 'Belum ada estimasi waktu';
        document.getElementById('next-expectation-note').textContent = journey.next_expectation_note || '';
      } else {
        nextUpdateRow.style.display = 'none';
      }

      // Render data-driven status rail
      renderStatusRail();

      // WhatsApp CTA
      renderWhatsAppCta(business);

      // Share button
      document.getElementById('btn-share').addEventListener('click', handleShare);

      // Start silent auto-refresh
      startAutoRefresh();
    }

    // ─── SHARE HANDLER ───────────────────────────────────────────────────────
    async function handleShare() {
      const { business, journey, service, steps } = PAGE_DATA;
      const currentStep = steps && steps[service.currentStepIndex];
      const shareData = {
        title: `${journey.title || ''} — ${business.name || ''}`,
        text: `${currentStep ? currentStep.label : ''} · Case #${journey.case_number || ''}`,
        url: journey.guest_url,
      };

      if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          if (err.name !== 'AbortError') copyFallback(journey.guest_url);
        }
      } else {
        copyFallback(journey.guest_url);
      }
    }

    function copyFallback(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('btn-share');
        const icon = btn.querySelector('iconify-icon');
        icon.setAttribute('icon', 'solar:check-circle-linear');

        // Show "Link disalin" tooltip
        const tooltip = document.createElement('div');
        tooltip.className = 'absolute -bottom-9 left-1/2 -translate-x-1/2 whitespace-nowrap text-[11px] font-semibold text-white bg-slate-800 rounded-lg px-3 py-1.5 shadow-lg pointer-events-none';
        tooltip.textContent = 'Link disalin';
        tooltip.style.opacity = '0';
        tooltip.style.transition = 'opacity 0.18s ease-out';
        btn.style.position = 'relative';
        btn.appendChild(tooltip);
        requestAnimationFrame(() => { tooltip.style.opacity = '1'; });

        setTimeout(() => {
          icon.setAttribute('icon', 'solar:share-linear');
          tooltip.style.opacity = '0';
          setTimeout(() => tooltip.remove(), 200);
        }, 2000);
      }).catch(() => {
        // Clipboard API not available — do nothing gracefully
      });
    }

    // ─── LIGHTBOX ────────────────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxStage = document.getElementById('lightbox-stage');
    const lightboxTrack = document.getElementById('lightbox-track');
    const lightboxFly = document.getElementById('lightbox-fly');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxCaptionText = document.getElementById('lightbox-caption-text');
    const lightboxHelperText = document.getElementById('lightbox-helper-text');
    const lightboxCounter = document.getElementById('lightbox-counter');
    const lightboxDots = document.getElementById('lightbox-dots');
    const lightboxHandle = document.getElementById('lightbox-handle');
    const lightboxClose = document.getElementById('lightbox-close');

    // Active photo set for lightbox — set dynamically when lightbox opens
    let photoSet = [];
    let rendered = false;
    let isOpen = false;
    let currentIndex = 0;
    let lastFocusedElement = null; // For focus trap restore

    // ─── PINCH-TO-ZOOM STATE ─────────────────────────────────────────────────
    // Improved: no transition during active gesture, use rAF for 60fps rendering.
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let panStartX = 0;
    let panStartY = 0;
    let panBaseX = 0;
    let panBaseY = 0;

    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartedInsidePhoto = false;
    let dragX = 0;
    let dragY = 0;
    let moved = false;
    let gesture = null;

    let isPinching = false;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchStartMidX = 0;
    let pinchStartMidY = 0;
    let pinchBasePanX = 0;
    let pinchBasePanY = 0;
    let pinchPanStarted = false;
    const pinchPanThreshold = 4; // Reduced from 8 for smoother response

    let lastTapTime = 0;
    let lastTapX = 0;
    let lastTapY = 0;

    // rAF-based rendering for smooth pinch/pan
    let rafPending = false;
    let rafTargetScale = 1;
    let rafTargetPanX = 0;
    let rafTargetPanY = 0;

    function scheduleZoomRender() {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        rafPending = false;
        const card = getCurrentCard();
        if (!card) return;
        card.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${scale})`;
      });
    }

    function renderSlides() {
      lightboxTrack.innerHTML = photoSet.map((photo, index) => `
        <div class="lightbox-slide">
          <div class="lightbox-card" data-card-index="${index}">
            <img class="lightbox-placeholder" src="${photo.thumb}" alt="" draggable="false">
            <img class="lightbox-full" src="${photo.src}" alt="Bukti layanan ${index + 1}" draggable="false" data-index="${index}">
            <div class="lightbox-shimmer" data-shimmer-index="${index}"></div>
          </div>
        </div>
      `).join('');

      lightboxTrack.querySelectorAll('.lightbox-full').forEach((img) => {
        const markLoaded = () => {
          img.classList.add('is-loaded');
          const shimmer = lightboxTrack.querySelector(`.lightbox-shimmer[data-shimmer-index="${img.dataset.index}"]`);
          if (shimmer) shimmer.classList.add('is-hidden');
        };

        img.addEventListener('load', markLoaded);
        img.addEventListener('error', () => {
          // Show error state instead of blank
          img.classList.add('is-error');
          const shimmer = lightboxTrack.querySelector(`.lightbox-shimmer[data-shimmer-index="${img.dataset.index}"]`);
          if (shimmer) {
            shimmer.classList.add('is-hidden');
          }
        });

        if (img.complete && img.naturalWidth) markLoaded();
      });

      photoSet.forEach((photo) => {
        const preload = new Image();
        preload.src = photo.src;
      });

      rendered = true;
    }

    function getStageWidth() {
      return lightboxStage.getBoundingClientRect().width || window.innerWidth;
    }

    function getCurrentCard() {
      return lightboxTrack.querySelector(`.lightbox-card[data-card-index="${currentIndex}"]`);
    }

    function isPointInsideCurrentPhoto(clientX, clientY) {
      const card = getCurrentCard();
      if (!card) return false;

      const rect = card.getBoundingClientRect();
      return (
        clientX >= rect.left &&
        clientX <= rect.right &&
        clientY >= rect.top &&
        clientY <= rect.bottom
      );
    }

    function areTouchesInsideCurrentPhoto(touches) {
      return Array.from(touches).every((touch) => (
        isPointInsideCurrentPhoto(touch.clientX, touch.clientY)
      ));
    }

    function getThumb(index = currentIndex) {
      const thumbs = Array.from(document.querySelectorAll('.evidence-thumb'));
      return index === 0 ? thumbs[0] : (thumbs[1] || thumbs[0]);
    }

    function setTrackPosition(extraX = 0, animated = true) {
      const stageWidth = getStageWidth();
      const x = -currentIndex * stageWidth + extraX;
      lightboxTrack.classList.toggle('no-anim', !animated);
      lightboxTrack.style.transform = `translate3d(${x}px, 0, 0)`;
    }

    function buildDots() {
      lightboxDots.innerHTML = '';
      if (photoSet.length <= 1) {
        lightboxDots.classList.add('hidden');
        return;
      }

      lightboxDots.classList.remove('hidden');
      photoSet.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.className = `rounded-full transition-all ${index === currentIndex ? 'w-4 h-1.5 bg-white' : 'w-1.5 h-1.5 bg-white/30'}`;
        lightboxDots.appendChild(dot);
      });
    }

    function updateMeta() {
      lightboxCounter.textContent = `${currentIndex + 1} / ${photoSet.length}`;
      lightboxCounter.classList.toggle('hidden', photoSet.length <= 1);
      lightboxCaptionText.textContent = photoSet[currentIndex]?.caption || '';
      lightboxHelperText.innerHTML = photoSet.length > 1
        ? 'Cubit untuk memperbesar &middot; Geser untuk melihat foto lain'
        : 'Cubit untuk memperbesar';
      buildDots();
    }

    function setUiOpacity(value, immediate = false) {
      const uiItems = [lightboxCaption, lightboxCounter, lightboxDots, lightboxHandle, lightboxClose];

      if (immediate) {
        uiItems.forEach((item) => {
          item.style.transition = 'none';
          item.style.opacity = String(value);
        });

        requestAnimationFrame(() => {
          uiItems.forEach((item) => {
            item.style.transition = '';
          });
        });

        return;
      }

      uiItems.forEach((item) => {
        item.style.opacity = String(value);
      });
    }

    function resetUiAndStage() {
      lightboxStage.style.transition = '';
      lightboxStage.style.transform = '';
      lightbox.style.backgroundColor = '';
      lightbox.style.transition = '';
      lightbox.style.opacity = '';
      lightboxTrack.querySelectorAll('.lightbox-card').forEach((card) => {
        card.style.opacity = '';
      });
      setUiOpacity(1);
    }

    function resetZoom(animated = true) {
      scale = 1;
      panX = 0;
      panY = 0;

      const card = getCurrentCard();
      if (!card) return;

      card.classList.toggle('no-anim', !animated);
      card.style.transformOrigin = 'center center';
      card.style.transform = 'translate3d(0px, 0px, 0) scale(1)';
    }

    function applyZoom(animated = true) {
      const card = getCurrentCard();
      if (!card) return;

      card.classList.toggle('no-anim', !animated);
      card.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${scale})`;
    }

    function getPanDamping() {
      return Math.min(1, Math.max(0, (scale - 1) / 0.55));
    }

    function applyDampedPan(targetPanX, targetPanY) {
      const damping = getPanDamping();
      panX = targetPanX * damping;
      panY = targetPanY * damping;
    }

    function setTransformOriginFromPoint(clientX, clientY) {
      const card = getCurrentCard();
      if (!card) return;

      const rect = card.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const x = Math.min(100, Math.max(0, ((clientX - rect.left) / rect.width) * 100));
      const y = Math.min(100, Math.max(0, ((clientY - rect.top) / rect.height) * 100));
      card.style.transformOrigin = `${x}% ${y}%`;
    }

    function toggleZoomAt(clientX, clientY) {
      if (scale > 1) {
        resetZoom(true);
        return;
      }

      setTransformOriginFromPoint(clientX, clientY);
      scale = 2.35;
      panX = 0;
      panY = 0;
      applyZoom(true);
    }

    function getDistance(touches) {
      const [a, b] = touches;
      return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    }

    function getMidpoint(touches) {
      const [a, b] = touches;
      return {
        x: (a.clientX + b.clientX) / 2,
        y: (a.clientY + b.clientY) / 2
      };
    }

    function animateFly(startRect, endRect, src, onDone) {
      lightboxFly.src = src;
      lightboxFly.style.transition = 'none';
      lightboxFly.style.opacity = '1';
      lightboxFly.style.top = `${startRect.top}px`;
      lightboxFly.style.left = `${startRect.left}px`;
      lightboxFly.style.width = `${startRect.width}px`;
      lightboxFly.style.height = `${startRect.height}px`;
      lightboxFly.style.borderRadius = '0.75rem';

      requestAnimationFrame(() => {
        lightboxFly.style.transition =
          'top 0.32s cubic-bezier(0.22, 1, 0.36, 1), left 0.32s cubic-bezier(0.22, 1, 0.36, 1), width 0.32s cubic-bezier(0.22, 1, 0.36, 1), height 0.32s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.20s ease-out';
        lightboxFly.style.top = `${endRect.top}px`;
        lightboxFly.style.left = `${endRect.left}px`;
        lightboxFly.style.width = `${endRect.width}px`;
        lightboxFly.style.height = `${endRect.height}px`;
        lightboxFly.style.borderRadius = '1rem';
      });

      window.setTimeout(() => {
        if (onDone) onDone();
      }, 340);
    }

    // ─── FOCUS TRAP ──────────────────────────────────────────────────────────
    function trapFocus(event) {
      if (!isOpen) return;
      if (event.key !== 'Tab') return;

      const focusable = lightbox.querySelectorAll('button:not([disabled]), [tabindex]:not([tabindex="-1"])');
      if (!focusable.length) return;

      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (event.shiftKey) {
        if (document.activeElement === first) {
          event.preventDefault();
          last.focus();
        }
      } else {
        if (document.activeElement === last) {
          event.preventDefault();
          first.focus();
        }
      }
    }

    function openLightbox(button, index, evidence) {
      // Save last focused element for restore
      lastFocusedElement = document.activeElement;

      // Set the active photo set from the evidence that was clicked
      if (evidence && evidence.photos) {
        photoSet = evidence.photos;
      }

      // Re-render slides for this photo set
      rendered = false;
      renderSlides();

      currentIndex = index;
      isOpen = true;

      lightbox.style.opacity = '';
      lightbox.style.backgroundColor = '';
      lightbox.style.transition = '';
      lightboxStage.style.transition = '';
      lightboxStage.style.transform = '';
      lightboxTrack.style.transition = '';
      lightboxTrack.style.opacity = '';

      document.body.style.overflow = 'hidden';
      resetUiAndStage();
      updateMeta();
      resetZoom(false);

      setUiOpacity(0, true);

      lightbox.classList.remove('opacity-0', 'pointer-events-none');
      lightbox.classList.add('opacity-100');

      setTrackPosition(0, false);

      const thumb = button || getThumb(index);
      const startRect = thumb.getBoundingClientRect();
      const currentCard = getCurrentCard();

      lightboxTrack.style.opacity = '1';
      if (currentCard) {
        currentCard.style.transition = 'none';
        currentCard.style.opacity = '0';
      }

      requestAnimationFrame(() => {
        const endRect = currentCard.getBoundingClientRect();

        animateFly(startRect, endRect, photoSet[index].thumb, () => {
          if (currentCard) {
            currentCard.style.transition = 'none';
            currentCard.style.opacity = '1';
          }

          lightboxFly.style.transition = 'none';
          lightboxFly.style.opacity = '0';

          requestAnimationFrame(() => {
            lightboxFly.style.transition = '';
            if (currentCard) currentCard.style.transition = '';
            setTrackPosition(0, true);

            window.setTimeout(() => {
              setUiOpacity(1);
              // Focus the close button for a11y
              lightboxClose.focus();
            }, 70);
          });

          window.setTimeout(() => {
            if (currentCard) currentCard.style.opacity = '';
          }, 180);
        });
      });

      // Activate focus trap
      document.addEventListener('keydown', trapFocus);
    }

    function closeLightbox() {
      if (!isOpen) return;

      // Deactivate focus trap
      document.removeEventListener('keydown', trapFocus);

      const currentCard = getCurrentCard();
      const thumb = getThumb(currentIndex);

      if (!currentCard || !thumb) {
        closeLightboxFromDrag();
        return;
      }

      const startRect = currentCard.getBoundingClientRect();
      const endRect = thumb.getBoundingClientRect();
      const clone = currentCard.cloneNode(true);

      clone.removeAttribute('data-card-index');
      clone.classList.add('no-anim');
      clone.style.position = 'fixed';
      clone.style.zIndex = '9999';
      clone.style.top = `${startRect.top}px`;
      clone.style.left = `${startRect.left}px`;
      clone.style.width = `${startRect.width}px`;
      clone.style.height = `${startRect.height}px`;
      clone.style.margin = '0';
      clone.style.transform = 'none';
      clone.style.transformOrigin = 'center center';
      clone.style.pointerEvents = 'none';
      clone.style.opacity = '1';
      clone.style.borderRadius = '1rem';
      clone.style.boxShadow = '0 30px 90px rgba(0,0,0,0.40)';

      document.body.appendChild(clone);

      lightboxTrack.classList.remove('no-anim');
      lightboxFly.style.opacity = '0';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          lightboxTrack.style.opacity = '0';
          setUiOpacity(0);

          lightbox.style.transition = 'opacity 0.30s ease-out, background-color 0.30s ease-out';
          lightbox.style.backgroundColor = 'rgba(2, 6, 23, 0)';
          lightbox.style.opacity = '0';

          clone.classList.remove('no-anim');
          clone.style.transition =
            'top 0.32s cubic-bezier(0.22, 1, 0.36, 1), left 0.32s cubic-bezier(0.22, 1, 0.36, 1), width 0.32s cubic-bezier(0.22, 1, 0.36, 1), height 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.24s ease-out, border-radius 0.32s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.32s cubic-bezier(0.22, 1, 0.36, 1)';
          clone.style.top = `${endRect.top}px`;
          clone.style.left = `${endRect.left}px`;
          clone.style.width = `${endRect.width}px`;
          clone.style.height = `${endRect.height}px`;
          clone.style.borderRadius = '0.75rem';
          clone.style.boxShadow = '0 10px 28px rgba(15,23,42,0.12)';
          clone.style.opacity = '0';
        });
      });

      window.setTimeout(() => {
        clone.remove();

        lightbox.classList.add('opacity-0', 'pointer-events-none');
        lightbox.classList.remove('opacity-100');

        document.body.style.overflow = '';
        lightboxTrack.style.opacity = '';
        resetZoom(false);
        setTrackPosition(0, false);

        resetUiAndStage();

        dragX = 0;
        dragY = 0;
        gesture = null;
        isOpen = false;

        // Restore focus
        if (lastFocusedElement) {
          lastFocusedElement.focus();
          lastFocusedElement = null;
        }
      }, 360);
    }

    function closeLightboxFromDrag() {
      if (!isOpen) return;

      // Deactivate focus trap
      document.removeEventListener('keydown', trapFocus);

      const currentCard = getCurrentCard();
      const thumb = getThumb(currentIndex);

      if (!currentCard || !thumb) {
        lightbox.classList.add('opacity-0', 'pointer-events-none');
        lightbox.classList.remove('opacity-100');
        document.body.style.overflow = '';
        resetZoom(false);
        setTrackPosition(0, false);
        resetUiAndStage();
        isOpen = false;
        if (lastFocusedElement) { lastFocusedElement.focus(); lastFocusedElement = null; }
        return;
      }

      const startRect = currentCard.getBoundingClientRect();
      const endRect = thumb.getBoundingClientRect();
      const clone = currentCard.cloneNode(true);

      clone.removeAttribute('data-card-index');
      clone.classList.add('no-anim');
      clone.style.position = 'fixed';
      clone.style.zIndex = '9999';
      clone.style.top = `${startRect.top}px`;
      clone.style.left = `${startRect.left}px`;
      clone.style.width = `${startRect.width}px`;
      clone.style.height = `${startRect.height}px`;
      clone.style.margin = '0';
      clone.style.transform = 'none';
      clone.style.transformOrigin = 'center center';
      clone.style.pointerEvents = 'none';
      clone.style.opacity = '1';
      clone.style.borderRadius = '1rem';
      clone.style.boxShadow = '0 30px 90px rgba(0,0,0,0.40)';

      document.body.appendChild(clone);

      lightboxTrack.classList.remove('no-anim');
      lightboxFly.style.opacity = '0';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          lightboxTrack.style.opacity = '0';
          lightboxStage.style.transform = '';
          setUiOpacity(0);

          lightbox.style.transition = 'opacity 0.30s ease-out, background-color 0.30s ease-out';
          lightbox.style.backgroundColor = 'rgba(2, 6, 23, 0)';
          lightbox.style.opacity = '0';

          clone.classList.remove('no-anim');
          clone.style.transition =
            'top 0.34s cubic-bezier(0.22, 1, 0.36, 1), left 0.34s cubic-bezier(0.22, 1, 0.36, 1), width 0.34s cubic-bezier(0.22, 1, 0.36, 1), height 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.24s ease-out, border-radius 0.34s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.34s cubic-bezier(0.22, 1, 0.36, 1)';
          clone.style.top = `${endRect.top}px`;
          clone.style.left = `${endRect.left}px`;
          clone.style.width = `${endRect.width}px`;
          clone.style.height = `${endRect.height}px`;
          clone.style.borderRadius = '0.75rem';
          clone.style.boxShadow = '0 10px 28px rgba(15,23,42,0.12)';
          clone.style.opacity = '0';
        });
      });

      window.setTimeout(() => {
        clone.remove();

        lightbox.classList.add('opacity-0', 'pointer-events-none');
        lightbox.classList.remove('opacity-100');

        document.body.style.overflow = '';
        lightboxTrack.style.opacity = '';
        resetZoom(false);
        setTrackPosition(0, false);

        resetUiAndStage();

        dragX = 0;
        dragY = 0;
        gesture = null;
        isOpen = false;

        // Restore focus
        if (lastFocusedElement) {
          lastFocusedElement.focus();
          lastFocusedElement = null;
        }
      }, 370);
    }

    function goToPhoto(nextIndex) {
      if (nextIndex < 0 || nextIndex >= photoSet.length) {
        setTrackPosition(0, true);
        return;
      }

      resetZoom(false);
      currentIndex = nextIndex;
      updateMeta();
      setTrackPosition(0, true);
    }

    function setDragDown(y) {
      const progress = Math.min(Math.max(y / 280, 0), 1);
      const stageScale = 1 - progress * 0.13;
      const backdropAlpha = 0.60 * (1 - progress * 0.72);
      const uiOpacity = Math.max(0, 1 - progress * 2);

      lightboxStage.style.transform = `translate3d(0, ${y}px, 0) scale(${stageScale})`;
      lightbox.style.backgroundColor = `rgba(2, 6, 23, ${backdropAlpha})`;
      setUiOpacity(uiOpacity);
    }

    function resetDragDown() {
      lightboxStage.style.transition = 'transform 0.24s cubic-bezier(0.22, 1, 0.36, 1)';
      lightbox.style.transition = 'background-color 0.24s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.24s ease-out';

      lightboxStage.style.transform = '';
      lightbox.style.backgroundColor = '';
      setUiOpacity(1);

      window.setTimeout(() => {
        lightboxStage.style.transition = '';
        lightbox.style.transition = '';
      }, 260);
    }

    // ─── TOUCH HANDLERS (improved pinch smoothness) ──────────────────────────
    lightboxStage.addEventListener('touchstart', (event) => {
      if (!isOpen) return;

      moved = false;
      gesture = null;
      dragX = 0;
      dragY = 0;

      if (event.touches.length === 2) {
        const midpoint = getMidpoint(event.touches);

        if (!areTouchesInsideCurrentPhoto(event.touches)) {
          isPinching = false;
          return;
        }

        isPinching = true;
        pinchStartDistance = getDistance(event.touches);
        pinchStartScale = scale;

        pinchStartMidX = midpoint.x;
        pinchStartMidY = midpoint.y;
        pinchBasePanX = panX;
        pinchBasePanY = panY;
        pinchPanStarted = false;

        // FIX #2: Only set transform-origin on FIRST zoom (scale === 1).
        // If already zoomed, keep existing origin to prevent jump.
        if (scale <= 1.06) {
          setTransformOriginFromPoint(midpoint.x, midpoint.y);
        }

        // IMPORTANT: disable CSS transition during active pinch for smooth 60fps
        const card = getCurrentCard();
        if (card) {
          card.classList.add('no-anim');
          card.style.transition = 'none';
        }

        event.preventDefault();
        return;
      }

      if (event.touches.length === 1) {
        const touch = event.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartedInsidePhoto = isPointInsideCurrentPhoto(touch.clientX, touch.clientY);
        panStartX = touch.clientX;
        panStartY = touch.clientY;
        panBaseX = panX;
        panBaseY = panY;

        // Disable transition during single-finger pan when zoomed
        if (scale > 1) {
          const card = getCurrentCard();
          if (card) {
            card.classList.add('no-anim');
            card.style.transition = 'none';
          }
        }
      }
    }, { passive: false });

    lightboxStage.addEventListener('touchmove', (event) => {
      if (!isOpen) return;

      if (isPinching && event.touches.length === 2) {
        const midpoint = getMidpoint(event.touches);
        const midpointDx = midpoint.x - pinchStartMidX;
        const midpointDy = midpoint.y - pinchStartMidY;
        const midpointMove = Math.hypot(midpointDx, midpointDy);

        // Smooth scale calculation with no minimum jump
        const rawScale = pinchStartScale * (getDistance(event.touches) / pinchStartDistance);
        scale = Math.min(5, Math.max(0.8, rawScale)); // Allow slight under-1 for rubber-band feel

        if (!pinchPanStarted && midpointMove > pinchPanThreshold) {
          pinchPanStarted = true;
        }

        const targetPanX = pinchPanStarted ? pinchBasePanX + midpointDx : pinchBasePanX;
        const targetPanY = pinchPanStarted ? pinchBasePanY + midpointDy : pinchBasePanY;

        applyDampedPan(targetPanX, targetPanY);

        // Use rAF for buttery smooth rendering
        scheduleZoomRender();

        event.preventDefault();
        return;
      }

      if (event.touches.length !== 1) return;

      const touch = event.touches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
        moved = true;
      }

      if (!touchStartedInsidePhoto) {
        if (!gesture && Math.abs(dy) > 10 && Math.abs(dy) > Math.abs(dx)) {
          gesture = 'dragClose';
        }

        if (gesture === 'dragClose') {
          dragY = Math.max(dy, 0);
          setDragDown(dragY);
        }

        event.preventDefault();
        return;
      }

      if (scale > 1) {
        const targetPanX = panBaseX + (touch.clientX - panStartX);
        const targetPanY = panBaseY + (touch.clientY - panStartY);
        applyDampedPan(targetPanX, targetPanY);
        scheduleZoomRender();
        event.preventDefault();
        return;
      }

      if (!gesture && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
        gesture = Math.abs(dx) > Math.abs(dy) ? 'swipe' : 'dragClose';
      }

      if (gesture === 'swipe') {
        dragX = dx;

        if ((currentIndex === 0 && dragX > 0) || (currentIndex === photoSet.length - 1 && dragX < 0)) {
          dragX *= 0.28;
        }

        setTrackPosition(dragX, false);
        event.preventDefault();
        return;
      }

      if (gesture === 'dragClose') {
        dragY = Math.max(dy, 0);
        setDragDown(dragY);
        event.preventDefault();
      }
    }, { passive: false });

    lightboxStage.addEventListener('touchend', (event) => {
      if (!isOpen) return;

      if (isPinching) {
        isPinching = false;
        pinchPanStarted = false;

        const card = getCurrentCard();
        if (card) {
          card.classList.remove('no-anim');
          card.style.transition = '';
        }

        // FIX #1: Smooth zoom-out — animate scale AND pan back proportionally.
        // Instead of snapping pan to 0, use a transition that brings both to rest.
        if (scale <= 1.06) {
          // Animate to scale 1 with pan proportionally easing to 0
          scale = 1;
          panX = 0;
          panY = 0;
          const cardEl = getCurrentCard();
          if (cardEl) {
            // Use a slightly longer, softer ease for zoom-out to feel natural
            cardEl.style.transition = 'transform 0.32s cubic-bezier(0.22, 1, 0.36, 1)';
            cardEl.style.transformOrigin = 'center center';
            cardEl.style.transform = 'translate3d(0px, 0px, 0) scale(1)';
            // Clear inline transition after animation completes
            setTimeout(() => { cardEl.style.transition = ''; }, 340);
          }
        } else if (scale > 5) {
          // Cap at max
          scale = 5;
          applyZoom(true);
        } else {
          applyDampedPan(panX, panY);
          applyZoom(true);
        }

        return;
      }

      // Re-enable transitions after single-finger pan
      if (scale > 1) {
        const card = getCurrentCard();
        if (card) {
          card.classList.remove('no-anim');
          card.style.transition = '';
        }
      }

      const now = Date.now();
      const isTap = !moved && !gesture && Math.abs(dragX) < 8 && Math.abs(dragY) < 8;

      if (isTap) {
        if (!touchStartedInsidePhoto) {
          closeLightbox();
          event.preventDefault();
          return;
        }

        const isDoubleTap =
          now - lastTapTime < 320 &&
          Math.abs(touchStartX - lastTapX) < 40 &&
          Math.abs(touchStartY - lastTapY) < 40;

        if (isDoubleTap) {
          toggleZoomAt(touchStartX, touchStartY);
          lastTapTime = 0;
          event.preventDefault();
          return;
        }

        lastTapTime = now;
        lastTapX = touchStartX;
        lastTapY = touchStartY;
      }

      if (gesture === 'dragClose') {
        if (dragY > 120) {
          closeLightboxFromDrag();
        } else {
          resetDragDown();
        }
      }

      if (gesture === 'swipe') {
        if (dragX < -64) goToPhoto(currentIndex + 1);
        else if (dragX > 64) goToPhoto(currentIndex - 1);
        else setTrackPosition(0, true);
      }

      gesture = null;
      dragX = 0;
      dragY = 0;
      lightboxTrack.classList.remove('no-anim');
      getCurrentCard()?.classList.remove('no-anim');
    }, { passive: false });

    lightboxStage.addEventListener('click', (event) => {
      if (!isOpen) return;

      if (!isPointInsideCurrentPhoto(event.clientX, event.clientY)) {
        closeLightbox();
      }
    });

    lightboxStage.addEventListener('dblclick', (event) => {
      if (!isOpen) return;
      if (!isPointInsideCurrentPhoto(event.clientX, event.clientY)) return;
      toggleZoomAt(event.clientX, event.clientY);
    });

    window.addEventListener('resize', () => {
      if (!isOpen) return;
      setTrackPosition(0, false);
    });

    document.addEventListener('keydown', (event) => {
      if (!isOpen) return;

      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowRight') goToPhoto(currentIndex + 1);
      if (event.key === 'ArrowLeft') goToPhoto(currentIndex - 1);
    });

    // ─── INIT ────────────────────────────────────────────────────────────────
    renderPage();
  </script>

</body>
</html>
