<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statusin — Guest Status Link View</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Statusin" />
  <meta property="og:title" content="{{journey.title}} — {{business.name}}" />
  <meta property="og:description" content="{{journey.current_label}} · Case #{{journey.case_number}} · {{journey.freshness_line}}" />
  <meta property="og:image" content="{{og_image_url}}" />
  <meta property="og:url" content="{{canonical_url}}" />
  <meta name="twitter:card" content="summary_large_image" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">


  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      #lightbox-fly, .lightbox-card, #lightbox-track { transition: none !important; }
    }
  </style>

  <style>
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    /* ─── Conductor Rail: Statusin Identity ─────────────────────────── */
    @keyframes conductor-flow {
      0% { background-position-y: 0px; }
      100% { background-position-y: 12px; }
    }

    .rail-line-done {
      width: 1.5px;
      background: rgba(22, 70, 91, 0.15);
    }

    .rail-line-active {
      width: 1.5px;
      background-image: repeating-linear-gradient(
        to bottom,
        #16465B 0px,
        #16465B 5px,
        transparent 5px,
        transparent 10px
      );
      background-size: 1.5px 10px;
      animation: conductor-flow 1.2s linear infinite;
    }

    .rail-line-upcoming {
      width: 1px;
      background: rgba(226, 232, 240, 0.8);
    }

    #lightbox { -webkit-tap-highlight-color: transparent; overscroll-behavior: contain; touch-action: none; }
    #lightbox-stage { will-change: transform; }
    #lightbox-track { display: flex; width: 100%; height: 100%; transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1); will-change: transform; }
    #lightbox-track.no-anim { transition: none; }
    .lightbox-slide { width: 100%; min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 16px; }
    .lightbox-card { position: relative; width: min(86vw, 520px); aspect-ratio: 3 / 2; border-radius: 1rem; overflow: hidden; background: rgba(255,255,255,0.06); box-shadow: 0 30px 90px rgba(0,0,0,0.40); transform-origin: center center; transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1); will-change: transform; }
    .lightbox-card.no-anim { transition: none; }
    .lightbox-placeholder, .lightbox-full { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
    .lightbox-placeholder { filter: blur(18px); transform: scale(1.06); opacity: 0.58; }
    .lightbox-full { opacity: 0; transition: opacity 0.22s ease-out; }
    .lightbox-full.is-loaded { opacity: 1; }
    .lightbox-full.is-error { opacity: 1; object-fit: none; background: rgba(255,255,255,0.04); }
    .lightbox-shimmer { position: absolute; inset: 0; overflow: hidden; background: rgba(255,255,255,0.08); }
    .lightbox-shimmer::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); animation: shimmer 1.4s infinite; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent); }
    .lightbox-shimmer.is-hidden { display: none; }
    .lightbox-ui { transition: opacity 0.22s ease-out; }
    #lightbox-fly { position: fixed; z-index: 140; object-fit: cover; border-radius: 0.75rem; box-shadow: 0 30px 90px rgba(0,0,0,0.40); pointer-events: none; opacity: 0; transition: top 0.32s cubic-bezier(0.22, 1, 0.36, 1), left 0.32s cubic-bezier(0.22, 1, 0.36, 1), width 0.32s cubic-bezier(0.22, 1, 0.36, 1), height 0.32s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.20s ease-out; }

    @media (orientation: landscape) and (max-height: 500px) {
      .lightbox-card { width: min(60vw, 480px); aspect-ratio: 16 / 9; }
      #lightbox-caption { bottom: 6px; padding: 0 1rem; }
      #lightbox-caption #lightbox-caption-text { font-size: 10px; max-height: 2.4em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      #lightbox-caption #lightbox-helper-text { display: none; }
      #lightbox-dots { bottom: 68px; }
    }

    .avatar-fallback { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; border-radius: 9999px; background: #16465B; color: white; font-weight: 700; font-size: 1.125rem; text-transform: uppercase; }
  </style>
</head>


<body class="min-h-screen bg-white px-4 sm:px-6 pt-0 pb-4 overflow-x-hidden">

  <!-- Subtle ambient background -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute -top-40 -left-32 w-[560px] h-[560px] rounded-full blur-[140px] bg-[#F6F1EA]/70"></div>
    <div class="absolute -bottom-44 -right-28 w-[620px] h-[620px] rounded-full blur-[150px] bg-[#FF5A5F]/7"></div>
    <div class="absolute top-[32%] left-[52%] -translate-x-1/2 w-[420px] h-[420px] rounded-full blur-[130px] bg-[#16465B]/4"></div>
  </div>

  <!-- Guest Status Link View -->
  <main class="relative z-10 w-full max-w-[560px] mx-auto">
    <div class="isolate flex flex-col w-full mx-auto relative bg-transparent text-slate-950">

      <!-- Sticky Header -->
      <div class="sticky top-0 z-50 -mx-4 sm:-mx-6 px-5 sm:px-6 py-4 flex items-center justify-between bg-white/78 backdrop-blur-2xl border-b border-slate-950/[0.04] shadow-[0_10px_34px_rgba(15,23,42,0.045)]">
        <button class="flex items-center gap-3 text-left group focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25 rounded-2xl transition-all" aria-label="Profil bisnis">
          <div id="avatar-wrapper" class="w-12 h-12 rounded-full bg-white p-[2px] group-active:scale-95 transition-transform duration-200 shadow-[0_12px_30px_rgba(15,23,42,0.12)] ring-1 ring-slate-950/[0.06]">
          </div>
          <div>
            <h2 id="business-name" class="text-base font-bold tracking-tight text-slate-950 group-hover:text-slate-700 transition-colors"></h2>
            <p id="case-number" class="text-xs font-medium mt-0.5 text-slate-500 group-hover:text-[#16465B] transition-colors"></p>
          </div>
        </button>
        <button id="btn-share" class="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-all focus:outline-none focus-visible:ring-2 bg-white/86 hover:bg-white active:bg-slate-100 focus-visible:ring-[#16465B]/20 border border-white shadow-[0_8px_20px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.04]" aria-label="Bagikan link status">
          <iconify-icon icon="solar:share-linear" class="text-lg text-[#16465B]"></iconify-icon>
        </button>
      </div>

      <!-- Main Content -->
      <div class="relative z-20 px-1 sm:px-0 pt-6 pb-10">

        <!-- ═══ HERO SECTION ═══ Commanding first impression -->
        <section class="mb-6" aria-labelledby="journey-title">
          <!-- Eyebrow: case info -->
          <p id="journey-complaint" class="text-[13px] text-slate-500 font-medium mb-1"></p>

          <!-- Big status title — the most important thing on the page -->
          <h1 id="journey-title" class="text-[26px] sm:text-[28px] font-extrabold text-slate-950 tracking-tight leading-[1.2] mb-3"></h1>

          <!-- Inline badge: responsibility + freshness — answers 2 questions in 1 line -->
          <div class="flex items-center gap-2 flex-wrap">
            <span id="hero-badge" class="inline-flex items-center gap-1.5 text-[12px] font-bold text-[#16465B] bg-[#16465B]/[0.10] px-3 py-1.5 rounded-full">
              <iconify-icon icon="solar:user-check-rounded-bold" class="text-sm"></iconify-icon>
              <span id="hero-badge-text"></span>
            </span>
            <span id="hero-freshness" class="text-[12px] font-medium text-slate-400"></span>
          </div>
        </section>

        <!-- ═══ CERTAINTY SUMMARY ═══ -->
        <section class="mb-6 bg-white/86 backdrop-blur-2xl border border-white rounded-[1.75rem] p-5 shadow-[0_18px_54px_rgba(15,23,42,0.08)] ring-1 ring-slate-950/[0.045]" aria-label="Ringkasan status">
          <p class="text-[10px] text-[#16465B] font-extrabold uppercase tracking-wider mb-2">Status Saat Ini</p>
          <p id="status-description" class="text-[14px] font-medium text-slate-700 leading-[21px]"></p>

          <div id="next-update-row" class="mt-4 pt-4 border-t border-slate-950/[0.04]">
            <p id="next-update-label" class="text-[13px] font-bold text-slate-900 leading-snug">
              <iconify-icon icon="solar:clock-circle-bold-duotone" class="text-[#16465B] text-[14px] mr-1 align-[-2px]"></iconify-icon>
              <span id="next-update-text"></span>
            </p>
            <p id="next-expectation-note" class="text-[13px] text-slate-500 leading-[19px] mt-1 pl-[22px]"></p>
          </div>
        </section>


        <!-- ═══ STATUS RAIL ═══ -->
        <section aria-label="Progress Layanan" class="mb-2">
          <h3 class="text-[13px] font-semibold text-[#16465B] mb-5">Progress Layanan</h3>
          <ol id="status-rail" class="relative list-none p-0 m-0" role="list"></ol>
        </section>

        <!-- ═══ CTA: WhatsApp ═══ -->
        <section class="pt-2">
          <a id="cta-whatsapp" href="#" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2.5 w-full px-5 py-3 rounded-2xl bg-[#16465B]/[0.07] hover:bg-[#16465B]/[0.11] active:scale-[0.98] transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-[#16465B]/25">
            <iconify-icon icon="mdi:whatsapp" class="text-lg text-[#16465B]"></iconify-icon>
            <span id="cta-whatsapp-text" class="text-[14px] font-semibold text-[#16465B]"></span>
          </a>
        </section>

        <!-- ═══ FOOTER ═══ -->
        <footer class="pt-16 pb-4 text-center">
          <p class="text-xs font-semibold text-slate-400 mb-0.5 tracking-wide">Statusin</p>
          <p class="text-xs text-slate-400">Kepastian untuk setiap layanan</p>
        </footer>

      </div>
    </div>
  </main>

  <!-- ═══ IMAGE LIGHTBOX ═══ -->
  <div id="lightbox" class="fixed inset-0 z-[100] opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-950/60 backdrop-blur-xl overflow-hidden" role="dialog" aria-modal="true" aria-label="Galeri foto bukti">
    <div id="lightbox-handle" class="lightbox-ui absolute top-3 left-1/2 -translate-x-1/2 w-10 h-1 rounded-full bg-white/30 z-20" aria-hidden="true"></div>
    <button type="button" onclick="closeLightbox()" aria-label="Tutup galeri foto" id="lightbox-close" class="lightbox-ui absolute top-5 right-5 w-10 h-10 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 active:scale-90 transition-all text-white z-20">
      <iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon>
    </button>
    <div id="lightbox-counter" class="lightbox-ui absolute top-6 left-1/2 -translate-x-1/2 text-xs font-semibold text-white/80 bg-white/10 rounded-full px-3 py-1 z-20" aria-live="polite" aria-atomic="true">1 / 2</div>
    <div id="lightbox-stage" class="absolute inset-0 flex items-center justify-center overflow-hidden">
      <div id="lightbox-track"></div>
    </div>
    <img id="lightbox-fly" src="" alt="" draggable="false" aria-hidden="true">
    <div id="lightbox-dots" class="lightbox-ui absolute bottom-40 left-1/2 -translate-x-1/2 flex gap-1.5 z-20" aria-hidden="true"></div>
    <div id="lightbox-caption" class="lightbox-ui absolute bottom-14 left-1/2 -translate-x-1/2 text-center px-6 w-full max-w-[560px] z-20">
      <p class="text-[13px] font-semibold text-white">Catatan Teknisi</p>
      <p id="lightbox-caption-text" class="text-xs text-white/70 mt-1 leading-relaxed"></p>
      <p id="lightbox-helper-text" class="text-[11px] text-white/50 mt-2">Cubit untuk memperbesar &middot; Geser untuk melihat foto lain</p>
    </div>
  </div>


  <script>
    // ─── DATA LAYER ──────────────────────────────────────────────────────────
    const PAGE_DATA = {
      business: {
        name: "iRepair Jakarta",
        avatar_url: "https://i.pravatar.cc/150?u=irepair-jakarta",
        whatsapp_number: "+6285143550781",
      },
      journey: {
        case_number: "SRV-681657",
        title: "Pemeriksaan Awal",
        complaint: "Service iPhone 11 · Mati total, layar retak",
        status_headline: "Sedang diperiksa teknisi",
        status_description: "Teknisi sedang mengecek komponen utama perangkat Anda.",
        responsibility_label: "Ditangani oleh",
        responsibility_badge: "Teknisi",
        freshness_line: "Baru saja",
        next_update_at: "2026-06-05T17:00:00+07:00",
        next_expectation_note: "Estimasi biaya akan muncul setelah pengecekan selesai.",
        guest_url: window.location.href,
      },
      service: {
        id: "case-681657",
        title: "Service iPhone 11",
        currentStepIndex: 1,
        currentStepKey: "initial_check",
      },
      steps: [
        { key: "service_received", label: "Layanan Diterima", status: "done", completedAtLabel: "Hari ini, 09.12" },
        { key: "initial_check", label: "Pemeriksaan Awal", status: "current", startedAtLabel: "Dimulai hari ini, 10.45" },
        { key: "cost_approval", label: "Persetujuan Biaya", status: "next" },
        { key: "in_progress", label: "Sedang Diproses", status: "upcoming" },
        { key: "final_check", label: "Pemeriksaan Akhir", status: "upcoming" },
        { key: "ready_for_pickup", label: "Siap Diambil", status: "upcoming" },
        { key: "completed", label: "Layanan Selesai", status: "upcoming" },
      ],
      evidencePhotos: [
        {
          id: "ev-001",
          stepKey: "initial_check",
          title: "Catatan Teknisi",
          description: "Foto kondisi perangkat setelah casing dibuka. Teknisi sedang mengecek jalur power dan konektor baterai.",
          capturedAtLabel: "12 mnt lalu",
          visibleToCustomer: true,
          photos: [
            { src: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=1200", thumb: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?auto=format&fit=crop&q=80&w=240", caption: "Foto kondisi perangkat setelah casing dibuka. Teknisi sedang mengecek jalur power dan konektor baterai." },
            { src: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=1200", thumb: "https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?auto=format&fit=crop&q=80&w=240", caption: "Pemeriksaan komponen internal lebih lanjut pada papan logic board." },
          ],
        },
      ],
    };


    // ─── AUTO-REFRESH (SILENT) ───────────────────────────────────────────────
    const REFRESH_INTERVAL_MS = 90000;
    let lastLoadedAt = new Date();
    let refreshTimer = null;

    function performSilentRefresh() {
      lastLoadedAt = new Date();
      // Production: fetch fresh data from API, then re-render.
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => { if (!document.hidden) performSilentRefresh(); }, REFRESH_INTERVAL_MS);
    }

    function stopAutoRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        if (Date.now() - lastLoadedAt.getTime() > 60000) performSilentRefresh();
        startAutoRefresh();
      } else { stopAutoRefresh(); }
    });

    // ─── UTILITIES ───────────────────────────────────────────────────────────
    function escapeHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function formatNextUpdate(isoString) {
      if (!isoString) return null;
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return null;
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta' });
      return isToday
        ? `Update berikutnya diperkirakan hari ini pk ${timeStr}`
        : `Update berikutnya: ${date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Asia/Jakarta' })} pk ${timeStr}`;
    }

    // ─── WINDOWED RAIL ───────────────────────────────────────────────────────
    function getVisibleSteps(steps, currentStepIndex) {
      const lastIndex = steps.length - 1;
      const end = Math.min(Math.max(currentStepIndex + 1, 2), lastIndex);
      return steps.slice(0, end + 1);
    }

    function getEvidenceForStep(stepKey) {
      if (!PAGE_DATA.evidencePhotos || !PAGE_DATA.evidencePhotos.length) return null;
      return PAGE_DATA.evidencePhotos.find(ev => ev.stepKey === stepKey && ev.visibleToCustomer) || null;
    }

    // ─── RENDER STATUS RAIL ──────────────────────────────────────────────────
    function renderStatusRail() {
      const { steps, service } = PAGE_DATA;
      if (!steps || !steps.length) { const s = document.getElementById('status-rail')?.closest('section'); if (s) s.style.display = 'none'; return; }

      const visibleSteps = getVisibleSteps(steps, service.currentStepIndex);
      const railEl = document.getElementById('status-rail');
      railEl.innerHTML = '';

      visibleSteps.forEach((step, index) => {
        const isLast = index === visibleSteps.length - 1;
        const nextStep = visibleSteps[index + 1];
        const evidence = getEvidenceForStep(step.key);
        const node = document.createElement('li');
        node.className = `relative flex gap-4 ${isLast ? '' : 'pb-7'}`;
        if (step.status === 'current') node.setAttribute('aria-current', 'step');

        // Determine connector line class based on context
        let lineClass = 'rail-line-upcoming'; // default
        if (step.status === 'done' && nextStep && nextStep.status === 'done') {
          lineClass = 'rail-line-done';
        } else if (step.status === 'done' && nextStep && nextStep.status === 'current') {
          lineClass = 'rail-line-done';
        } else if (step.status === 'current') {
          lineClass = 'rail-line-active'; // ANIMATED — Statusin identity
        }

        const leftCol = document.createElement('div');
        leftCol.className = 'relative w-6 shrink-0 flex justify-center';
        leftCol.setAttribute('aria-hidden', 'true');

        if (step.status === 'done') {
          leftCol.innerHTML = `<iconify-icon icon="solar:check-circle-bold" class="relative z-10 text-[21px] text-[#16465B]/30"></iconify-icon>${!isLast ? `<div class="absolute top-[21px] -bottom-7 ${lineClass}"></div>` : ''}`;
        } else if (step.status === 'current') {
          leftCol.innerHTML = `<div class="relative z-10 w-[20px] h-[20px] min-w-[20px] min-h-[20px] shrink-0 mt-0.5 rounded-full bg-[#16465B] border-[3px] border-white shadow-[0_0_0_4px_rgba(22,70,91,0.12)]"></div>${!isLast ? `<div class="absolute top-[24px] -bottom-7 ${lineClass}"></div>` : ''}`;
        } else {
          leftCol.innerHTML = `<div class="relative z-10 w-[20px] h-[20px] min-w-[20px] min-h-[20px] shrink-0 mt-0.5 rounded-full border-2 border-slate-200 bg-white"></div>${!isLast ? `<div class="absolute top-[24px] -bottom-7 ${lineClass}"></div>` : ''}`;
        }
        node.appendChild(leftCol);

        const rightCol = document.createElement('div');
        rightCol.className = 'min-w-0 flex-1';
        if (step.status === 'done') {
          rightCol.innerHTML = `<p class="text-[13px] font-medium text-slate-950">${escapeHtml(step.label)}</p>${step.completedAtLabel ? `<p class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(step.completedAtLabel)}</p>` : ''}`;
        } else if (step.status === 'current') {
          rightCol.innerHTML = `<p class="text-[15px] font-semibold text-slate-950 tracking-tight">${escapeHtml(step.label)}</p>${step.startedAtLabel ? `<p class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(step.startedAtLabel)}</p>` : ''}`;
        } else {
          rightCol.innerHTML = `<p class="text-[14px] font-medium text-slate-400">${escapeHtml(step.label)}</p>`;
        }

        if (evidence && (step.status === 'current' || step.status === 'done')) {
          rightCol.appendChild(renderEvidenceCard(evidence));
        }
        node.appendChild(rightCol);
        railEl.appendChild(node);
      });
    }


    // ─── RENDER EVIDENCE CARD ────────────────────────────────────────────────
    function renderEvidenceCard(evidence) {
      const card = document.createElement('div');
      card.className = 'mt-3 bg-white/88 backdrop-blur-xl border border-white rounded-[18px] p-3 shadow-[0_10px_28px_rgba(15,23,42,0.06)] ring-1 ring-slate-950/[0.035]';
      const header = document.createElement('div');
      header.className = 'flex items-center justify-between gap-2 mb-2';
      header.innerHTML = `<p class="text-[12px] font-semibold text-slate-950">${escapeHtml(evidence.title)}</p><span class="text-[11px] font-semibold text-slate-500">${escapeHtml(evidence.capturedAtLabel)}</span>`;
      card.appendChild(header);

      if (evidence.description) {
        const desc = document.createElement('p');
        desc.className = 'text-[13px] text-slate-500 leading-[19px]';
        desc.textContent = evidence.description;
        card.appendChild(desc);
      }

      if (evidence.photos && evidence.photos.length > 0) {
        const photosContainer = document.createElement('div');
        photosContainer.className = 'mt-3 flex gap-2';
        const MAX_VISIBLE = 2;
        evidence.photos.slice(0, MAX_VISIBLE).forEach((photo, index) => {
          const isLast = index === MAX_VISIBLE - 1 && evidence.photos.length > MAX_VISIBLE;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'group focus:outline-none rounded-xl focus-visible:ring-2 focus-visible:ring-[#16465B]/25 relative flex-shrink-0';
          btn.setAttribute('aria-label', `Lihat foto bukti ${index + 1} dari ${evidence.photos.length}`);
          btn.onclick = () => openLightbox(btn.querySelector('img'), index, evidence);
          const img = document.createElement('img');
          img.src = photo.thumb;
          img.alt = `Bukti ${index + 1}`;

      if (gesture === 'dragClose') { dragY = Math.max(dy, 0); setDragDown(dragY); e.preventDefault(); }
    }, { passive: false });

    lightboxStage.addEventListener('touchend', (e) => {
      if (!isOpen) return;
      if (isPinching) {
        isPinching = false; pinchPanStarted = false;
        const card = getCurrentCard(); if (card) { card.classList.remove('no-anim'); card.style.transition = ''; }
        if (scale <= 1.06) { scale = 1; panX = 0; panY = 0; const c = getCurrentCard(); if (c) { c.style.transition = 'transform 0.32s cubic-bezier(0.22,1,0.36,1)'; c.style.transformOrigin = 'center center'; c.style.transform = 'translate3d(0px, 0px, 0) scale(1)'; setTimeout(() => { c.style.transition = ''; }, 340); } }
        else if (scale > 5) { scale = 5; applyZoom(true); }
        else { applyDampedPan(panX, panY); applyZoom(true); }
        return;
      }
      if (scale > 1) { const card = getCurrentCard(); if (card) { card.classList.remove('no-anim'); card.style.transition = ''; } }
      const now = Date.now(); const isTap = !moved && !gesture && Math.abs(dragX) < 8 && Math.abs(dragY) < 8;
      if (isTap) {
        if (!touchStartedInsidePhoto) { closeLightbox(); e.preventDefault(); return; }
        const isDbl = now - lastTapTime < 320 && Math.abs(touchStartX - lastTapX) < 40 && Math.abs(touchStartY - lastTapY) < 40;
        if (isDbl) { toggleZoomAt(touchStartX, touchStartY); lastTapTime = 0; e.preventDefault(); return; }
        lastTapTime = now; lastTapX = touchStartX; lastTapY = touchStartY;
      }
      if (gesture === 'dragClose') { if (dragY > 120) closeLightboxFromDrag(); else resetDragDown(); }
      if (gesture === 'swipe') { if (dragX < -64) goToPhoto(currentIndex+1); else if (dragX > 64) goToPhoto(currentIndex-1); else setTrackPosition(0, true); }
      gesture = null; dragX = 0; dragY = 0; lightboxTrack.classList.remove('no-anim'); getCurrentCard()?.classList.remove('no-anim');
    }, { passive: false });

    lightboxStage.addEventListener('click', (e) => { if (isOpen && !isPointInsideCurrentPhoto(e.clientX, e.clientY)) closeLightbox(); });
    lightboxStage.addEventListener('dblclick', (e) => { if (!isOpen) return; if (isPointInsideCurrentPhoto(e.clientX, e.clientY)) toggleZoomAt(e.clientX, e.clientY); });
    window.addEventListener('resize', () => { if (isOpen) setTrackPosition(0, false); });
    document.addEventListener('keydown', (e) => { if (!isOpen) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowRight') goToPhoto(currentIndex+1); if (e.key === 'ArrowLeft') goToPhoto(currentIndex-1); });

    // ─── INIT ────────────────────────────────────────────────────────────────
    renderPage();
  </script>
</body>
